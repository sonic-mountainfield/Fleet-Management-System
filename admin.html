<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陽光小屋 - 指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        #routeMap { height: 450px; width: 100%; border-radius: 1.5rem; border: 4px solid #8B1A1A; z-index: 1; }
        .user-card { transition: all 0.3s ease; border-top-width: 6px; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        /* 成員位置標籤樣式 */
        .member-marker { background: #8B1A1A; color: #D4AF37; border: 2px solid #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="bg-[#8B1A1A] text-white p-6 rounded-3xl shadow-xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <h1 class="text-3xl font-black tracking-widest text-[#D4AF37]">陽光小屋指揮中心</h1>
            <p class="text-xs uppercase font-bold opacity-80 tracking-[0.3em]">Fleet Command & Real-time Map</p>
        </div>
        <button onclick="fetchAllData()" class="bg-[#D4AF37] text-[#8B1A1A] px-8 py-3 rounded-xl font-black text-sm shadow-lg active:scale-95 transition-all">
            同步數據 ↻
        </button>
    </header>

    <div class="max-w-full mx-auto mb-10">
        <div id="routeMap" class="shadow-2xl"></div>
    </div>

    <div id="fleetDashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-20 text-gray-400 font-bold italic animate-pulse">正在掃描衛星位置並識別成員...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/j7wain8kbsyu9';
        const CHECKIN_URL = `${API_BASE}?sheet=CheckIns`;
        const USER_URL = `${API_BASE}?sheet=Users`;
        const ITINERARY_URL = `${API_BASE}?sheet=Itinerary`;

        // 1. 初始化地圖
        const map = L.map('routeMap').setView([29.646, 91.117], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let memberLayer = L.layerGroup().addTo(map);
        let stationLayer = L.layerGroup().addTo(map);

        // 2. 定義固定路線座標點
        const stations = [
            { name: "拉薩", pos: [29.646, 91.117] },
            { name: "尼木", pos: [29.433, 90.166] },
            { name: "曲水", pos: [29.356, 90.733] },
            { name: "日喀則", pos: [29.267, 88.881] },
            { name: "大竹卡", pos: [29.351, 89.652] },
            { name: "定日", pos: [28.583, 87.083] },
            { name: "珠峰", pos: [28.143, 86.848] },
            { name: "江孜", pos: [28.917, 89.600] },
            { name: "羊湖", pos: [28.933, 90.416] }
        ];

        // 繪製固定標點與路線
        function drawBaseRoute() {
            stationLayer.clearLayers();
            const polylinePoints = stations.map(s => s.pos);
            
            // 繪製虛線路徑
            L.polyline(polylinePoints, {
                color: '#8B1A1A', weight: 3, opacity: 0.5, dashArray: '5, 10'
            }).addTo(stationLayer);

            // 繪製固定圓點標籤
            stations.forEach(s => {
                L.circleMarker(s.pos, {
                    radius: 6, fillColor: "#D4AF37", color: "#8B1A1A", weight: 2, fillOpacity: 1
                }).addTo(stationLayer).bindPopup(`<b>${s.name}</b>`);
            });
        }

        // 3. 數據同步
        async function fetchAllData() {
            try {
                const [checkinRes, userRes, itiRes] = await Promise.all([
                    fetch(CHECKIN_URL), 
                    fetch(USER_URL),
                    fetch(ITINERARY_URL)
                ]);
                const checkins = await checkinRes.json();
                const users = await userRes.json();
                const itinerary = await itiRes.json();
                
                const userMap = {};
                users.forEach(u => userMap[u.ID || u.id] = u.N || "未知成員");

                processFleetData(checkins, userMap, itinerary);
            } catch (e) {
                console.error("同步失敗", e);
            }
        }

        function processFleetData(records, userMap, itinerary) {
            const fleet = {};
            memberLayer.clearLayers(); // 清除成員當前位置標記

            records.forEach(reg => {
                const id = reg.CustomerID;
                if (!fleet[id]) fleet[id] = [];
                fleet[id].push(reg);
            });

            const container = document.getElementById('fleetDashboard');
            container.innerHTML = "";

            Object.keys(fleet).forEach(id => {
                const userRecords = fleet[id];
                const lastReg = userRecords[userRecords.length - 1];
                const isFinished = lastReg.Type === 'END';
                const driverName = userMap[id] || id;

                // 抓取最後位置名稱
                const stageInfo = itinerary.find(i => i.Section === lastReg.Section && i.Day === lastReg.Day);
                const locName = lastReg.Type === 'START' ? stageInfo?.Start_Point : stageInfo?.End_Point;

                // 在地圖上標記成員位置
                stations.forEach(s => {
                    if (locName && locName.includes(s.name)) {
                        const memberIcon = L.divIcon({
                            className: 'member-marker',
                            html: driverName.substring(0, 1), // 顯示名字第一個字
                            iconSize: [30, 30]
                        });
                        L.marker(s.pos, { icon: memberIcon })
                            .addTo(memberLayer)
                            .bindPopup(`<b>${driverName}</b><br>當前：${locName}<br>時間：${lastReg.Time}`);
                    }
                });

                // 生成看板卡片
                const card = document.createElement('div');
                card.className = `user-card bg-white rounded-3xl shadow-lg overflow-hidden ${isFinished ? "border-green-500" : "border-blue-500"}`;
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black text-gray-800">${driverName}</h3>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ID: ${id}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-[10px] font-black ${isFinished ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                                ${isFinished ? '已抵達' : '行進中'}
                            </span>
                        </div>
                        <div class="space-y-4">
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <div class="flex justify-between items-center mb-1 text-[10px] font-black uppercase text-gray-400">
                                    <span>目前賽段</span>
                                    <span class="${lastReg.Type === 'START' ? 'text-blue-500' : 'text-green-500'}">${lastReg.Type}</span>
                                </div>
                                <p class="font-bold text-gray-700 text-lg">${lastReg.Section}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">衛星定位位置</p>
                                <p class="text-sm font-bold text-gray-800 leading-tight">${locName || '同步中...'}</p>
                            </div>
                            <div class="pt-4 border-t flex justify-between items-center text-xs">
                                <span class="text-gray-400 font-mono">紀錄: ${userRecords.length} 筆</span>
                                <span class="font-black text-[#8B1A1A] bg-red-50 px-2 py-1 rounded">${lastReg.Time}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        drawBaseRoute();
        fetchAllData();
        setInterval(fetchAllData, 30000);
    </script>
</body>
</html>
