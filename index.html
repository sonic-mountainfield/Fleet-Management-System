<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 終端系統啟動</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #000; margin: 0; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* 背景流光效果 */
        .bg-grid {
            background-image: linear-gradient(rgba(139, 26, 26, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 26, 26, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 登入卡片：科技邊框 */
        .login-card { 
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 2.5rem; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(139, 26, 26, 0.2);
        }

        .input-box { 
            background: #000; 
            border: 2px solid #333; 
            color: #fff; 
            text-align: center; 
            font-size: 1.5rem; 
            letter-spacing: 0.1em; 
            transition: all 0.3s;
        }
        .input-box:focus { border-color: #D4AF37; outline: none; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* 商標發光樣式 */
        .logo-container {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
            animation: pulse 3s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .btn-glow { 
            background: #8B1A1A; 
            box-shadow: 0 0 20px rgba(139, 26, 26, 0.5);
            transition: all 0.3s;
        }
        .btn-glow:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-grid">
    
    <div class="w-full max-w-sm px-8 relative z-10">
        <div class="login-card p-10 text-center border-t-4 border-t-[#8B1A1A]">
            
            <div class="mb-8 flex justify-center">
                <div class="logo-container bg-black/40 p-4 rounded-3xl border border-white/5">
                    <img src="src/logo.png" alt="SunnyHouse" class="w-24 h-auto object-contain">
                </div>
            </div>

            <h1 class="tech-font text-2xl font-black text-white italic tracking-tighter mb-1">FLEET TERMINAL</h1>
            <p class="text-[#D4AF37] text-[10px] font-black uppercase tracking-[0.4em] mb-12 opacity-80">SunnyHouse Tours Tibet</p>

            <div class="space-y-6">
                <div class="text-left">
                    <label class="text-gray-500 text-[10px] font-black mb-3 block text-center uppercase tracking-widest">身分驗證：請輸入 8 位數生日</label>
                    <input type="number" id="birthday" placeholder="YYYYMMDD" 
                           class="input-box w-full p-5 rounded-2xl font-black tech-font">
                </div>
                
                <button onclick="handleLogin()" id="loginBtn" 
                        class="btn-glow w-full py-5 text-white font-black rounded-2xl text-xl tracking-widest tech-font italic">
                    START SYSTEM
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Encrypted Satellite Link v3.0</p>
            </div>
        </div>
    </div>

    <script>
        // API 位址保持一致
        const API_URL = 'https://sheetdb.io/api/v1/j7wain8kbsyu9?sheet=Users';

        async function handleLogin() {
            const passInput = document.getElementById('birthday').value.trim();
            const btn = document.getElementById('loginBtn');
            
            if (!passInput || passInput.length !== 8) { 
                alert("請輸入完整的 8 位數生日（例如 19900427）"); 
                return; 
            }
            
            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Connection Failed");
                
                const users = await response.json();
                
                // 查找隊員：確保生日欄位與輸入完全匹配
                const user = users.find(u => String(u.Birthday).trim() === passInput);
                
                if (user) {
                    // 儲存資訊供 main.html 使用
                    localStorage.setItem('driverID', user.ID || user.CustomerID);
                    localStorage.setItem('driverName', user.N || user.Name);
                    
                    // 登入成功跳轉
                    window.location.href = 'src/main.html';
                } else {
                    alert("驗證失敗：查無隊員資料，請確認生日輸入正確。");
                    btn.disabled = false; 
                    btn.innerText = "START SYSTEM";
                }
            } catch (e) { 
                alert("衛星連線錯誤，請檢查網路狀態"); 
                btn.disabled = false; 
                btn.innerText = "START SYSTEM"; 
            }
        }

        // 監聽 Enter 鍵
        document.getElementById('birthday').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
