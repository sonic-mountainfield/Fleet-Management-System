<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 駕駛員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .login-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
        .glow-btn { box-shadow: 0 0 20px rgba(139, 26, 26, 0.4); transition: all 0.3s; }
        .glow-btn:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(139, 26, 26, 0.8); }
        .input-focus:focus { border-color: #D4AF37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-950 relative">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#8B1A1A] opacity-20 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900 opacity-20 blur-[120px] rounded-full"></div>

    <div class="w-full max-w-sm px-6 relative z-10">
        <div class="login-card p-10 rounded-[3rem] shadow-2xl text-center">
            
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-[#8B1A1A] rounded-2xl flex items-center justify-center border-2 border-[#D4AF37] shadow-lg">
                    <span class="text-[#D4AF37] font-black tech-font text-2xl">SH</span>
                </div>
            </div>

            <h1 class="text-white font-black text-2xl mb-2 tracking-tighter">SUNNY HOUSE</h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mb-10">Piloting Terminal</p>

            <div class="space-y-6">
                <div class="text-left">
                    <label class="text-slate-400 text-[10px] font-black uppercase tracking-widest ml-4 mb-2 block">Driver ID</label>
                    <input type="text" id="driverID" placeholder="輸入您的駕駛 ID (如: U100)" 
                        class="w-full bg-slate-900/50 border-2 border-slate-700 p-4 rounded-2xl text-white font-black outline-none input-focus transition-all text-center placeholder:text-slate-700">
                </div>

                <button onclick="handleLogin()" id="loginBtn" class="w-full py-4 bg-[#8B1A1A] text-white font-black rounded-2xl glow-btn text-lg tracking-widest flex items-center justify-center gap-3">
                    <span id="btnText">啟動終端</span>
                    <div id="loading" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </div>

            <p class="mt-10 text-[10px] text-slate-600 font-bold uppercase tracking-tighter">Verified by Sunny House Fleet System</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/poo9epu17583p?sheet=Users';

        async function handleLogin() {
            const idInput = document.getElementById('driverID').value.trim().toUpperCase();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');

            if (!idInput) {
                alert("請輸入有效的駕駛 ID");
                return;
            }

            // 進入加載狀態
            btn.disabled = true;
            btnText.innerText = "驗證中...";
            loading.classList.remove('hidden');

            try {
                const response = await fetch(API_URL);
                const users = await response.json();

                // 搜尋用戶，對應 ID 欄位
                const user = users.find(u => (u.ID || u.id) === idInput);

                if (user) {
                    // 【關鍵】儲存資訊到 localStorage
                    // 這裡使用 user.NAME 確保與你的 Excel 欄位名稱對應
                    localStorage.setItem('driverID', idInput);
                    localStorage.setItem('driverName', user.NAME || user.Name || "未知駕駛");

                    console.log("登入成功，儲存姓名為:", localStorage.getItem('driverName'));

                    // 跳轉到主頁面
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 500);
                } else {
                    alert("ID 驗證失敗，請檢查輸入是否正確");
                    resetBtn();
                }
            } catch (error) {
                console.error("API Error:", error);
                alert("系統連線失敗，請檢查網路連線");
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            btn.disabled = false;
            btnText.innerText = "啟動終端";
            loading.classList.add('hidden');
        }

        // 監聽 Enter 鍵
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
