<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽光小屋車隊 - 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8F4E3; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-sm w-full bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-[#8B1A1A]">
        <div class="p-8 text-center">
            <h1 class="text-3xl font-bold text-[#8B1A1A] tracking-widest">陽光小屋</h1>
            <p class="text-xs text-[#D4AF37] font-bold mt-1 tracking-tighter">SUNNY HOUSE FLEET</p>
            
            <div class="mt-10 space-y-5">
                <div class="text-left">
                    <label class="text-xs font-bold text-gray-400 ml-1">出生年月日 (YYYYMMDD)</label>
                    <input type="number" id="birthday" placeholder="範例：19900520" 
                           class="w-full mt-1 px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#8B1A1A] outline-none text-lg tracking-widest">
                </div>
                <button onclick="handleLogin()" id="loginBtn"
                        class="w-full bg-[#8B1A1A] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-red-900 transition-all active:scale-95">
                    進入系統
                </button>
            </div>
            <p class="text-[10px] text-gray-400 mt-8">扎西德勒 · 祝您旅途愉快</p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const birthday = document.getElementById('birthday').value;
            if (!birthday || birthday.length < 8) return alert("請輸入正確的 8 位數生日");
            
            const btn = document.getElementById('loginBtn');
            btn.innerText = "驗證中...";
            btn.disabled = true;

            try {
                // 串接您的 API 比對 Birthday 欄位
                const response = await fetch(`https://sheetdb.io/api/v1/poo9epu17583p/search?Birthday=${birthday}`);
                const data = await response.json();

                if (data.length > 0) {
                    localStorage.setItem('user', JSON.stringify(data[0]));
                    window.location.href = 'src/main.html';
                } else {
                    alert("查無此資料，請確認輸入是否正確。");
                }
            } catch (e) {
                alert("網路異常，請稍後再試");
            } finally {
                btn.innerText = "進入系統";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
