<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽光小屋車隊系統 - 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'tibet-red': '#8B1A1A', 'tibet-gold': '#D4AF37', 'tibet-white': '#F8F4E3' }
                }
            }
        }
    </script>
</head>
<body class="bg-tibet-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-sm w-full bg-white rounded-xl shadow-2xl overflow-hidden border-t-8 border-tibet-red">
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-tibet-red">陽光小屋車隊</h1>
                <p class="text-gray-500 text-sm mt-2">扎西德勒！請輸入您的身分資訊</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">出生年月日 (登入密碼)</label>
                    <input type="number" id="birthday" placeholder="範例：19900520" 
                           class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-tibet-red focus:border-tibet-red">
                </div>
                <button onclick="handleLogin()" id="loginBtn"
                        class="w-full bg-tibet-red text-white py-3 rounded-md font-bold hover:bg-red-900 transition duration-200">
                    進入系統
                </button>
            </div>
        </div>
        <div class="bg-tibet-red py-2 text-center">
            <span class="text-tibet-gold text-xs">SUNNY HOUSE FLEET SYSTEM</span>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const birthday = document.getElementById('birthday').value;
            if (!birthday) return alert("請輸入出生年月日");
            
            const btn = document.getElementById('loginBtn');
            btn.innerText = "驗證中...";
            btn.disabled = true;

            try {
                // 向 SheetDB 查詢 (請更換為你的 API ID)
                const response = await fetch(`https://sheetdb.io/api/v1/你的API_ID/search?Birthday=${birthday}`);
                const data = await response.json();

                if (data.length > 0) {
                    localStorage.setItem('user', JSON.stringify(data[0]));
                    // 登入成功跳轉至主頁
                    window.location.href = 'main.html';
                } else {
                    alert("驗證失敗，請確認日期格式是否正確。");
                }
            } catch (e) {
                alert("網路異常，請稍後再試");
            } finally {
                btn.innerText = "進入系統";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
