<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 駕駛員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .login-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 3rem; }
        .glow-btn { box-shadow: 0 0 20px rgba(139, 26, 26, 0.4); transition: 0.3s; }
        .glow-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-950 relative">

    <div class="w-full max-w-sm px-6 relative z-10">
        <div class="login-card p-10 shadow-2xl text-center">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-[#8B1A1A] rounded-2xl flex items-center justify-center border-2 border-[#D4AF37]">
                    <span class="text-[#D4AF37] font-black tech-font text-2xl">SH</span>
                </div>
            </div>

            <h1 class="text-white font-black text-2xl mb-10 tracking-tighter">SUNNY HOUSE PILOT</h1>

            <div class="space-y-6">
                <div class="text-left">
                    <label class="text-slate-500 text-[10px] font-black uppercase tracking-widest ml-4 mb-2 block">Driver ID</label>
                    <input type="text" id="driverID" placeholder="U100" 
                        class="w-full bg-slate-900 border-2 border-slate-700 p-4 rounded-2xl text-white font-black outline-none focus:border-[#D4AF37] text-center uppercase">
                </div>

                <button onclick="handleLogin()" id="loginBtn" class="w-full py-4 bg-[#8B1A1A] text-white font-black rounded-2xl glow-btn text-lg tracking-widest">
                    啟動終端
                </button>
            </div>
            <p class="mt-10 text-[10px] text-slate-600 font-bold uppercase tracking-widest">Verified by Sunny House</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/poo9epu17583p?sheet=Users';

        async function handleLogin() {
            const idInput = document.getElementById('driverID').value.trim().toUpperCase();
            if (!idInput) return alert("請輸入 ID");

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = "驗證中...";

            try {
                const response = await fetch(API_URL);
                const users = await response.json();

                // 尋找用戶
                const user = users.find(u => (u.ID || u.id) === idInput);

                if (user) {
                    // 【關鍵修正】對應 Excel 欄位 "N"
                    const nameToStore = user.N || user.NAME || "駕駛員";
                    
                    localStorage.setItem('driverID', idInput);
                    localStorage.setItem('driverName', nameToStore);

                    window.location.href = 'main.html';
                } else {
                    alert("ID 錯誤");
                    btn.disabled = false;
                    btn.innerText = "啟動終端";
                }
            } catch (error) {
                alert("網路錯誤");
                btn.disabled = false;
                btn.innerText = "啟動終端";
            }
        }
    </script>
</body>
</html>
