<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陽光小屋 - 西藏珠峰環線自駕證書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --tibet-red: #8B1A1A; --tibet-gold: #D4AF37; }
        body { background-color: #f0f2f5; font-family: sans-serif; }
        
        /* 證書主體設計 */
        .cert-outer { background: white; border: 15px solid var(--tibet-red); outline: 4px solid var(--tibet-gold); outline-offset: -12px; position: relative; }
        .cert-inner { padding: 50px; background: radial-gradient(circle at 50% 50%, #ffffff 0%, #fffbf0 100%); }
        
        /* 圓曲化地圖區塊 */
        .real-map-container {
            height: 380px; width: 100%; border-radius: 40px; 
            background: linear-gradient(135deg, #eef2f3 0%, #d5dde0 100%);
            position: relative; overflow: hidden; border: 2px solid #ddd;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.05);
        }
        
        /* 地圖裝飾：地形質感 */
        .terrain-layer {
            position: absolute; width: 100%; height: 100%; opacity: 0.15;
            background-image: url('https://www.transparenttextures.com/patterns/pinstripe-light.png');
        }

        /* 圓滑軌跡動畫 */
        .smooth-path {
            fill: none; stroke: var(--tibet-gold); stroke-width: 5;
            stroke-linecap: round; stroke-dasharray: 1200; stroke-dashoffset: 1200;
            animation: drawPath 3s forwards cubic-bezier(0.45, 0, 0.55, 1);
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
        }

        @keyframes drawPath { to { stroke-dashoffset: 0; } }
        .tibet-font { font-family: 'Noto Serif TC', serif; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        @media print { .no-print { display: none; } body { padding: 0; } .cert-outer { border-width: 10px; box-shadow: none; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg mb-10 no-print">
        <div class="flex gap-4">
            <input type="text" id="targetID" placeholder="請輸入駕駛員 ID (如: U100)" class="flex-1 border-2 border-gray-100 p-4 rounded-xl outline-none focus:border-[#8B1A1A] font-bold text-lg">
            <button onclick="generateRealCert()" class="bg-[#8B1A1A] text-[#D4AF37] px-10 py-4 rounded-xl font-black text-lg hover:bg-black transition-all">生成證書</button>
        </div>
    </div>

    <div id="certBody" class="max-w-5xl mx-auto cert-outer hidden">
        <div class="cert-inner">
            <div class="flex justify-between items-start mb-12">
                <img src="logo.png" alt="陽光小屋" class="w-24 h-24 object-contain">
                <div class="text-right">
                    <h1 class="text-5xl tibet-font text-[#8B1A1A] tracking-tighter">西藏珠峰環線自駕證書</h1>
                    <p class="tech-font text-[11px] text-[#D4AF37] tracking-[0.5em] mt-2">OFFICIAL DRIVING RECORD</p>
                </div>
            </div>

            <div class="mb-10 text-left leading-loose">
                <p class="text-2xl text-gray-800">
                    尊敬的 <span id="dispName" class="text-4xl font-black border-b-4 border-[#D4AF37] px-6 text-black">---</span> 隊員：
                </p>
                <p class="text-lg text-gray-600 mt-6 indent-12">
                    感謝您參與「陽光小屋車隊」西藏自駕壯遊。在此次征途中，您憑藉卓越技術，穿越海拔 4,000 公尺以上高原，完成總計 <span id="dispDist" class="font-bold text-[#8B1A1A]">--</span> 公里的壯麗巡航。
                </p>
            </div>

            <div class="real-map-container mb-12">
                <div class="terrain-layer"></div>
                <svg viewBox="0 0 1000 400" class="w-full h-full p-10 relative z-10">
                    <path class="smooth-path" d="M850,100 C750,50 650,50 600,100 C500,180 400,80 300,150 C200,250 100,320 150,350 C250,380 450,320 650,350 C800,320 900,150 850,100" />
                    
                    <g fill="#8B1A1A">
                        <circle cx="850" cy="100" r="10" stroke="white" stroke-width="3" /> <text x="865" y="105" class="text-[16px] font-black">拉薩</text>
                        <circle cx="600" cy="100" r="6" /> <text x="590" y="85" class="text-[12px] fill-gray-500">日喀則</text>
                        <circle cx="300" cy="150" r="6" /> <text x="270" y="140" class="text-[12px] fill-gray-500">拉孜</text>
                        <circle cx="150" cy="350" r="12" fill="#D4AF37" stroke="white" stroke-width="3" /> <text x="60" y="380" class="text-[14px] font-black">珠峰大本營 🏔️</text>
                        <circle cx="650" cy="350" r="7" /> <text x="640" y="380" class="text-[12px] fill-gray-500">江孜</text>
                        <circle cx="850" cy="300" r="7" /> <text x="865" y="315" class="text-[12px] fill-gray-500">羊卓雍措</text>
                    </g>
                </svg>
            </div>

            <div class="flex justify-between items-end border-t pt-10 border-gray-100">
                <div class="grid grid-cols-2 gap-10">
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase tech-font">Total Distance</p>
                        <p class="text-3xl font-black text-gray-800"><span id="valDist">--</span> KM</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase tech-font">Avg Elevation</p>
                        <p class="text-3xl font-black text-gray-800">4,250 M</p>
                    </div>
                </div>
                
                <div class="text-center">
                    <div class="w-32 h-32 border-4 border-[#8B1A1A] rounded-full flex items-center justify-center mb-2 rotate-[-15deg] shadow-lg">
                        <div class="text-[#8B1A1A] font-black text-[11px] leading-tight italic">OFFICIAL<br>SHF VERIFIED</div>
                    </div>
                    <p class="tibet-font text-2xl font-bold text-[#8B1A1A]">總管家 敬上</p>
                    <p class="text-[10px] text-gray-400 mt-2 font-mono" id="certDate">---</p>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-12 no-print">
        <button onclick="window.print()" class="bg-gray-800 text-white px-12 py-5 rounded-full font-bold shadow-2xl hover:scale-105 transition-all">🖨️ 下載 PDF 榮譽證書</button>
    </div>

    <script>
        async function generateRealCert() {
            const id = document.getElementById('targetID').value.toUpperCase().trim();
            if(!id) return;

            try {
                const [checkinRes, userRes, itineraryRes] = await Promise.all([
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p/search?CustomerID=${id}&sheet=CheckIns`),
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p?sheet=Users`),
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary`)
                ]);

                const records = await checkinRes.json();
                const users = await userRes.json();
                const itinerary = await itineraryRes.json();

                if(records.length === 0) { alert("查無數據"); return; }

                const user = users.find(u => (u.ID || u.id) === id);
                const doneSections = [...new Set(records.filter(r => r.Type === 'END').map(r => r.Section))];
                let totalDist = 0;
                itinerary.forEach(item => {
                    if(doneSections.map(s => s.toLowerCase()).includes(item.Section.toLowerCase())) {
                        totalDist += parseFloat(item.D || 0);
                    }
                });

                document.getElementById('dispName').innerText = user ? (user.NAME || user.Name) : id;
                document.getElementById('dispDist').innerText = totalDist.toFixed(1);
                document.getElementById('valDist').innerText = totalDist.toFixed(1);
                document.getElementById('certDate').innerText = `DATE: ${new Date().toLocaleDateString()}`;
                
                document.getElementById('certBody').classList.remove('hidden');
            } catch (e) { alert("讀取失敗"); }
        }
    </script>
</body>
</html>
