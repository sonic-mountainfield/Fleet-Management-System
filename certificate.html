<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陽光小屋 - 完賽榮譽證書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        .cert-border { border: 25px solid #8B1A1A; outline: 6px solid #D4AF37; outline-offset: -18px; position: relative; }
        .cert-bg { background-color: #fffaf0; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
        .tibet-font { font-family: 'Noto Serif TC', serif; }
        .hand-font { font-family: 'Zhi Mang Xing', cursive; }
        .stat-box { background: rgba(139, 26, 26, 0.05); border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .map-container { background: white; border-radius: 24px; border: 2px dashed #D4AF37; position: relative; overflow: hidden; }
        @media print { .no-print { display: none; } body { padding: 0; margin: 0; } }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-lg mb-8 no-print border-2 border-[#D4AF37]">
        <h2 class="font-bold mb-4 text-[#8B1A1A] flex items-center gap-2 text-xl">🏆 製作榮譽證書</h2>
        <div class="flex gap-4">
            <input type="text" id="searchID" placeholder="輸入駕駛員 ID (如: U100)" class="flex-1 border-2 border-gray-200 p-4 rounded-xl outline-none focus:border-[#8B1A1A] transition-all font-black text-lg">
            <button onclick="generateFinalCert()" class="bg-[#8B1A1A] text-[#D4AF37] px-10 py-4 rounded-xl font-black shadow-lg hover:bg-black active:scale-95 transition-all text-lg">生成</button>
        </div>
    </div>

    <div id="certificateView" class="max-w-4xl mx-auto cert-bg cert-border p-10 md:p-16 shadow-2xl hidden relative">
        
        <div class="absolute right-[-20px] bottom-0 opacity-5 pointer-events-none">
             <img src="https://img.icons8.com/color/512/mountain.png" class="w-96">
        </div>

        <div class="text-center relative z-10">
            <h1 class="text-6xl tibet-font text-[#8B1A1A] mb-2 tracking-widest">完賽榮譽證書</h1>
            <p class="text-[#D4AF37] tracking-[0.6em] font-black mb-10 uppercase text-xs">Certificate of Achievement</p>
            
            <div class="text-left space-y-6 text-gray-800 mb-10">
                <p class="text-3xl">
                    尊敬的 <span id="certName" class="text-5xl font-black border-b-4 border-[#D4AF37] px-4 text-black hand-font">---</span> 駕駛員：
                </p>
                <p class="text-lg leading-loose indent-10 font-medium">
                    在 <span id="certTotalDays" class="font-bold text-[#8B1A1A]">--</span> 天的極限挑戰中，您憑藉卓越意志與精湛車技，圓滿完成「陽光小屋車隊」西藏巡航任務。成功穿越高原險阻，環繞神山聖湖，特頒此證以資紀念。扎西德勒！
                </p>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="stat-box p-5 text-center">
                    <p class="text-[10px] text-[#D4AF37] font-bold uppercase mb-1">冒險總里程</p>
                    <h3 class="text-3xl font-black text-[#8B1A1A]"><span id="certDist">--</span><span class="text-sm ml-1 font-bold">KM</span></h3>
                </div>
                <div class="stat-box p-5 text-center">
                    <p class="text-[10px] text-[#D4AF37] font-bold uppercase mb-1">完成賽段</p>
                    <h3 class="text-3xl font-black text-[#8B1A1A]"><span id="certSS">--</span><span class="text-sm ml-1 font-bold">STAGES</span></h3>
                </div>
                <div class="stat-box p-5 text-center">
                    <p class="text-[10px] text-[#D4AF37] font-bold uppercase mb-1">駕駛時數</p>
                    <h3 class="text-3xl font-black text-[#8B1A1A]"><span id="certTime">--</span></h3>
                </div>
            </div>

            <div class="map-container w-full h-[320px] mb-12 bg-white shadow-inner flex flex-col items-center justify-center">
                <div class="absolute top-4 left-6 text-[10px] font-black text-gray-300 uppercase italic tracking-widest">Adventure Loop Track</div>
                <svg viewBox="0 0 800 400" class="w-full h-full p-6">
                    <path id="fullPath" d="M400,320 C250,320 100,280 100,200 C100,120 250,80 400,80 C550,80 700,120 700,200 C700,280 550,320 400,320" fill="none" stroke="#e5e7eb" stroke-width="12" stroke-linecap="round" />
                    <path id="donePath" d="M400,320 C250,320 100,280 100,200 C100,120 250,80 400,80 C550,80 700,120 700,200 C700,280 550,320 400,320" fill="none" stroke="#D4AF37" stroke-width="12" stroke-linecap="round" stroke-dasharray="2000" stroke-dashoffset="2000" style="transition: stroke-dashoffset 2s ease-in-out;" />
                    
                    <g transform="translate(400,320)">
                        <circle r="10" fill="#8B1A1A" stroke="white" stroke-width="2"/>
                        <text y="35" text-anchor="middle" class="text-[14px] font-black fill-gray-800">拉薩 (凱旋)</text>
                        <text y="-5" text-anchor="middle" class="text-[12px] fill-white">🚩</text>
                    </g>
                    <g transform="translate(200,290)">
                        <circle r="8" fill="#D4AF37" id="dot-羊卓雍措"/>
                        <text x="-15" y="25" text-anchor="end" class="text-[12px] font-bold fill-gray-500">羊卓雍措</text>
                    </g>
                    <g transform="translate(100,200)">
                        <circle r="8" fill="#D4AF37" id="dot-江孜"/>
                        <text x="-15" y="5" text-anchor="end" class="text-[12px] font-bold fill-gray-500">江孜</text>
                    </g>
                    <g transform="translate(200,110)">
                        <circle r="8" fill="#D4AF37" id="dot-日喀則"/>
                        <text x="-15" y="-15" text-anchor="end" class="text-[12px] font-bold fill-gray-500">日喀則</text>
                    </g>
                    <g transform="translate(400,80)">
                        <circle r="8" fill="#D4AF37" id="dot-拉孜"/>
                        <text y="-25" text-anchor="middle" class="text-[12px] font-bold fill-gray-500">拉孜</text>
                    </g>
                    <g transform="translate(600,110)">
                        <circle r="12" fill="#8B1A1A" stroke="#D4AF37" stroke-width="2" id="dot-珠峰"/>
                        <text x="20" y="-15" text-anchor="start" class="text-[14px] font-black fill-[#8B1A1A]">珠峰大本營 🏔️</text>
                    </g>
                    <g transform="translate(700,200)">
                        <circle r="8" fill="#D4AF37" id="dot-回程"/>
                        <text x="15" y="5" text-anchor="start" class="text-[12px] font-bold fill-gray-500">雅江河谷</text>
                    </g>

                    <image id="carIcon" href="https://img.icons8.com/color/96/sport-utility-vehicle.png" x="0" y="0" height="40" width="40" style="visibility: hidden;" />
                </svg>
            </div>

            <div class="flex justify-between items-end px-4">
                <div class="text-left text-[10px] font-bold text-gray-400 space-y-1">
                    <p>認證日期：<span id="certDate">---</span></p>
                    <p>證書編號：SHF-<span id="certNo">---</span></p>
                </div>
                <div class="text-center">
                    <div class="w-32 h-32 border-4 border-[#8B1A1A] rounded-full flex items-center justify-center mb-2 mx-auto relative rotate-[-12deg] bg-white shadow-lg">
                        <div class="text-[#8B1A1A] font-black text-[12px] leading-tight">陽光小屋<br>西藏自駕<br>官方認證</div>
                    </div>
                    <p class="font-black text-2xl tibet-font text-[#8B1A1A]">總管家 敬上</p>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-12 no-print">
        <button onclick="window.print()" class="bg-[#8B1A1A] text-[#D4AF37] px-12 py-5 rounded-full font-black shadow-2xl hover:scale-105 transition-all text-xl">🖨️ 列印證書 / 存為 PDF</button>
    </div>

    <script>
        async function generateFinalCert() {
            const id = document.getElementById('searchID').value.toUpperCase().trim();
            if(!id) return alert("請輸入 ID");

            try {
                const [checkinRes, userRes, itineraryRes] = await Promise.all([
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p/search?CustomerID=${id}&sheet=CheckIns`),
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p?sheet=Users`),
                    fetch(`https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary`)
                ]);

                const records = await checkinRes.json();
                const users = await userRes.json();
                const itinerary = await itineraryRes.json();

                if(records.length === 0) return alert("查無打卡紀錄");

                const currentUser = users.find(u => (u.ID || u.id) === id);
                const userName = currentUser ? (currentUser.NAME || currentUser.Name) : id;
                
                const doneSections = [...new Set(records.filter(r => r.Type === 'END').map(r => r.Section))];
                let totalDist = 0;
                let totalMin = 0;

                itinerary.forEach(item => {
                    const sect = (item.Section || item.section || "").toLowerCase();
                    if(doneSections.map(s => s.toLowerCase()).includes(sect)) {
                        totalDist += parseFloat(item.D || item.d || 0);
                        const timeStr = item.Est_Time || "";
                        const hr = parseInt(timeStr.match(/(\d+)\s*hr/) ? timeStr.match(/(\d+)\s*hr/)[1] : 0);
                        const min = parseInt(timeStr.match(/(\d+)\s*min/) ? timeStr.match(/(\d+)\s*min/)[1] : 0);
                        totalMin += (hr * 60 + min);
                    }
                });

                const dates = records.map(r => new Date(r.Day)).sort((a,b) => a-b);
                const diffTime = Math.abs(dates[dates.length - 1] - dates[0]);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

                // 渲染文字數據
                document.getElementById('certName').innerText = userName;
                document.getElementById('certTotalDays').innerText = diffDays;
                document.getElementById('certDist').innerText = totalDist.toFixed(1);
                document.getElementById('certSS').innerText = doneSections.length;
                document.getElementById('certTime').innerText = `${Math.floor(totalMin/60)}h ${totalMin%60}m`;
                document.getElementById('certDate').innerText = new Date().toLocaleDateString();
                document.getElementById('certNo').innerText = Math.floor(1000 + Math.random() * 8999);

                document.getElementById('certificateView').classList.remove('hidden');
                
                // 動態地圖動畫
                animateMap(doneSections.length, 6); // 假設總賽段為 6

            } catch (e) { alert("生成失敗"); }
        }

        function animateMap(done, total) {
            const path = document.getElementById('donePath');
            const car = document.getElementById('carIcon');
            const length = path.getTotalLength();
            
            // 計算完賽比例 (最高 1)
            const progress = Math.min(done / total, 1);
            
            path.style.strokeDashoffset = length * (1 - progress);
            
            if (progress > 0) {
                car.style.visibility = "visible";
                const point = path.getPointAtLength(length * progress);
                car.setAttribute("x", point.x - 20);
                car.setAttribute("y", point.y - 40);
            }
        }
    </script>
</body>
</html>
