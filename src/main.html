<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 專業導航終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0d0d0d; color: #e5e5e5; margin: 0; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .nav-header { position: sticky; top: 0; z-index: 100; background: #8B1A1A; border-bottom: 3px solid #D4AF37; }
        .date-tab { transition: 0.3s; opacity: 0.5; color: white; padding: 12px 20px; font-weight: 900; border-bottom: 4px solid transparent; }
        .date-tab.active { opacity: 1; border-color: #D4AF37; color: #D4AF37; transform: scale(1.1); }
        
        /* 賽段卡片樣式 */
        .stage-card { background: #1a1a1a; border: 1px solid #333; border-radius: 2.5rem; margin-bottom: 1.5rem; }
        .ss-header { font-size: 3.8rem; font-style: italic; font-weight: 900; background: linear-gradient(to bottom, #8B1A1A, #ff4d4d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Note 獨立文字方塊樣式 */
        .note-strip { background: rgba(212, 175, 55, 0.1); border: 1px dashed #D4AF37; border-radius: 1rem; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .note-time { color: #D4AF37; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; min-width: 80px; }
        .note-text { color: #bbb; font-weight: bold; font-size: 0.85rem; line-height: 1.4; }

        .loc-badge { background: #000; color: #D4AF37; border: 1px solid #D4AF37; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; }
        .line-connector { position: absolute; left: 20px; top: 45px; bottom: 45px; width: 2px; background: #334155; }
        .name-banner { background: linear-gradient(to right, #ffffff, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 4rem; line-height: 1.1; }
        .description-box { background: rgba(212, 175, 55, 0.05); border-left: 6px solid #D4AF37; padding: 1rem; border-radius: 0 1rem 1rem 0; margin-bottom: 1.5rem; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="nav-header">
        <div class="p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center font-black text-[#8B1A1A]">陽</div>
                <h1 class="tech-font text-xs tracking-tight text-white italic">FLEET TERMINAL</h1>
            </div>
            <button onclick="switchTab('record')" class="text-xs font-black text-[#D4AF37] border-2 border-[#D4AF37] px-4 py-1 rounded-full">🏆 冒險紀錄</button>
        </div>
        <div id="dateScroll" class="flex overflow-x-auto px-6 py-2 gap-8 bg-[#6b1414] scrollbar-hide">
            <button onclick="changeDay('4/27')" class="date-tab active text-lg" id="tab-4/27">4/27</button>
            <button onclick="changeDay('4/28')" class="date-tab text-lg" id="tab-4/28">4/28</button>
            <button onclick="changeDay('4/29')" class="date-tab text-lg" id="tab-4/29">4/29</button>
            <button onclick="changeDay('4/30')" class="date-tab text-lg" id="tab-4/30">4/30</button>
            <button onclick="changeDay('5/1')" class="date-tab text-lg" id="tab-5/1">5/1</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-2">
        <div id="nav-view">
            <div class="mt-6 mb-10 px-2">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.5em] mb-1">Authenticated Commander</p>
                <h2 id="userNameDisplay" class="font-black name-banner italic">---</h2>
            </div>
            <section class="mb-10 bg-zinc-900 rounded-[2.5rem] p-8 border border-zinc-800">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentDayText" class="text-2xl font-black italic text-[#D4AF37]">ROUTE PLAN</h2>
                    <button id="btnDayMap" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm shadow-lg">全日地圖</button>
                </div>
                <div id="dayEndpoints" class="space-y-2 text-gray-400 font-bold text-lg border-l-4 border-gray-700 pl-6"></div>
            </section>
            
            <div id="stageContainer" class="space-y-2"></div>
        </div>

        <div id="record-view" class="hidden">
            <button onclick="switchTab('nav')" class="text-[#D4AF37] font-bold text-sm mb-8 flex items-center gap-2">← BACK</button>
            <div class="bg-zinc-900 p-10 rounded-[3rem] border-b-[12px] border-[#8B1A1A] shadow-2xl mb-10 text-white text-center">
                <h2 id="recordNameDisplay" class="text-5xl font-black italic mb-10">---</h2>
                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-black/50 p-8 rounded-[2rem] border border-gray-800">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Total KM</p>
                        <p id="statKM" class="text-4xl font-black tech-font">0.0</p>
                    </div>
                    <div class="bg-black/50 p-8 rounded-[2rem] border border-gray-800">
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Total Time</p>
                        <p id="statTime" class="text-4xl font-black tech-font text-[#D4AF37]">0h</p>
                    </div>
                </div>
            </div>
            <div id="splitList" class="space-y-2"></div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let itineraryData = [];
        const uID = localStorage.getItem('driverID');
        const uName = localStorage.getItem('driverName');

        if (!uID || !uName) window.location.href = '../index.html';

        async function init() {
            document.getElementById('userNameDisplay').innerText = uName;
            document.getElementById('recordNameDisplay').innerText = uName;
            try {
                const res = await fetch(`${API_BASE}?sheet=Itinerary`);
                itineraryData = await res.json();
                const now = new Date();
                const today = `${now.getMonth() + 1}/${now.getDate()}`;
                const validDays = ["4/27","4/28","4/29","4/30","5/1"];
                const startDay = validDays.includes(today) ? today : "4/27";
                changeDay(startDay);
            } catch (e) { console.error("API Load Fail"); }
        }

        function switchTab(view) {
            document.getElementById('nav-view').classList.toggle('hidden', view !== 'nav');
            document.getElementById('record-view').classList.toggle('hidden', view !== 'record');
            document.getElementById('dateScroll').style.display = view === 'nav' ? 'flex' : 'none';
            if(view === 'record') loadPersonalData();
        }

        function changeDay(day) {
            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');
            
            const dayData = itineraryData.filter(i => i.Day === day);
            
            // 渲染全日概覽
            const dLine = dayData.find(i => i.Section === "DayLine");
            if (dLine) {
                document.getElementById('currentDayText').innerText = `${day} ROUTE`;
                document.getElementById('dayEndpoints').innerHTML = `<p>START: ${dLine.Start_Point}</p><p>FINISH: ${dLine.End_Point}</p>`;
                document.getElementById('btnDayMap').onclick = () => window.open(dLine.Amap_Link);
            }

            // 渲染混合列表 (SS 賽段 + Note)
            // 過濾掉 DayLine，其餘按照順序渲染
            const mainContent = dayData.filter(i => i.Section !== "DayLine");
            
            let ssCounter = 0; // 用來計算 A0, A1...
            
            document.getElementById('stageContainer').innerHTML = mainContent.map((item) => {
                if (item.Section === "Note") {
                    // 渲染為獨立 Note 條
                    return `
                        <div class="note-strip">
                            <div class="note-time">${item.T || ''}</div>
                            <div class="note-text">${item.Description || ''}</div>
                        </div>
                    `;
                } else if (item.Section.startsWith("SS")) {
                    // 渲染為賽段卡片
                    const html = `
                        <div class="stage-card shadow-2xl">
                            <div class="p-10">
                                <div class="flex justify-between items-start mb-8">
                                    <h3 class="ss-header tech-font">${item.Section}</h3>
                                    <div class="text-right text-4xl font-black tech-font text-white">${item.D} <small class="text-lg">Km</small></div>
                                </div>
                                <div class="space-y-12 mb-10 relative">
                                    <div class="line-connector"></div>
                                    <div class="flex items-center gap-8 relative">
                                        <div class="loc-badge">A${ssCounter}</div>
                                        <div>
                                            <p class="text-gray-500 text-[10px] font-black uppercase tracking-widest">Start Point</p>
                                            <p class="text-3xl font-black text-white leading-tight">${item.Start_Point}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-8 relative">
                                        <div class="loc-badge" style="border-color:#8B1A1A">A${ssCounter+1}</div>
                                        <div>
                                            <p class="text-[#8B1A1A] text-[10px] font-black uppercase tracking-widest">Finish Point</p>
                                            <p class="text-3xl font-black text-white leading-tight">${item.End_Point}</p>
                                        </div>
                                    </div>
                                </div>
                                ${item.Description ? `
                                <div class="description-box">
                                    <p class="text-[10px] text-[#D4AF37] font-black uppercase mb-1 tracking-[0.2em]">Pilot Notes</p>
                                    <p class="text-lg font-bold text-gray-300">${item.Description}</p>
                                </div>` : ''}
                                <button onclick="window.open('${item.Amap_Link}')" class="w-full py-7 bg-white text-black font-black text-2xl rounded-2xl mb-6 shadow-2xl active:scale-95 transition-all italic">🧭 開啟導航</button>
                                <div class="grid grid-cols-2 gap-5">
                                    <button class="bg-[#8B1A1A] py-6 rounded-[1.5rem] font-black text-white text-lg">START 打卡</button>
                                    <button class="border-2 border-[#333] py-6 rounded-[1.5rem] font-black text-gray-500 text-lg">FINISH 打卡</button>
                                </div>
                            </div>
                        </div>
                    `;
                    ssCounter++; // 只有 SS 賽段增加計數
                    return html;
                }
                return '';
            }).join('');
        }

        async function loadPersonalData() {
            const splitArea = document.getElementById('splitList');
            splitArea.innerHTML = '<p class="p-20 text-center animate-pulse text-gray-600 font-bold uppercase tracking-widest">Syncing Data...</p>';
            try {
                const res = await fetch(`${API_BASE}?sheet=CheckIns`);
                const allChecks = await res.json();
                const myEnds = allChecks.filter(r => r.CustomerID === uID && r.Type === 'END');
                let tk = 0, tm = 0, html = "";
                const days = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                days.forEach(d => {
                    const dayDone = myEnds.filter(r => r.Day === d);
                    let dk = 0;
                    dayDone.forEach(r => {
                        const info = itineraryData.find(i => i.Day === d && i.Section.toLowerCase() === r.Section.toLowerCase());
                        if(info) {
                            dk += parseFloat(info.D || 0);
                            tm += (parseInt(info.Est_Time.match(/(\d+)hr/)?.[1] || 0) * 60) + parseInt(info.Est_Time.match(/(\d+)min/)?.[1] || 0);
                        }
                    });
                    tk += dk;
                    html += `
                        <div class="flex justify-between items-center p-8 bg-zinc-900 rounded-[2rem] border border-zinc-800 mb-2">
                            <div><p class="text-[10px] text-gray-500 mb-1 uppercase">${d}</p><p class="font-black ${dayDone.length > 0 ? 'text-[#D4AF37]' : 'text-zinc-800'}">${dayDone.length > 0 ? '✔️ COMPLETE' : '---'}</p></div>
                            <div class="text-right text-2xl font-black tech-font text-white">${dk.toFixed(1)} KM</div>
                        </div>`;
                });
                document.getElementById('statKM').innerText = tk.toFixed(1);
                document.getElementById('statTime').innerText = `${Math.floor(tm/60)}h ${tm%60}m`;
                splitArea.innerHTML = html;
            } catch (e) { splitArea.innerHTML = "數據加載出錯"; }
        }

        init();
    </script>
</body>
</html>
