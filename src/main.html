<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西藏自駕導航終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stage-card { border-left: 8px solid #8B1A1A; transition: all 0.3s ease; }
        .description-box { background: rgba(139, 26, 26, 0.03); border-radius: 8px; border-left: 3px solid #D4AF37; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div id="dayRouteContainer" class="max-w-4xl mx-auto mb-6 bg-white rounded-2xl shadow-lg border-t-4 border-blue-500 overflow-hidden">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 id="currentDayTitle" class="text-xl font-black text-blue-800 tracking-tight">正在讀取今日行程...</h2>
                <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Day Route</span>
            </div>
            <div id="dayRouteSummary" class="text-sm text-gray-600 space-y-1 mb-6"></div>
            
            <button id="openFullDayNav" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg active:scale-95 transition-all text-lg">
                觀看全日路線
            </button>
        </div>
    </div>

    <div id="stageList" class="max-w-4xl mx-auto space-y-6">
        </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary';
        const currentDay = "4/28"; // 您可以根據實際情況動態設定

        async function loadItinerary() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderUI(data.filter(item => item.Day === currentDay));
            } catch (e) {
                console.error("載入行程失敗");
            }
        }

        function renderUI(dayData) {
            const list = document.getElementById('stageList');
            const summary = document.getElementById('dayRouteSummary');
            const dayTitle = document.getElementById('currentDayTitle');
            list.innerHTML = "";

            // 1. 處理全日路線
            const dayLine = dayData.find(item => item.Section === "DayLine");
            if (dayLine) {
                dayTitle.innerText = `${currentDay} 全日路線`;
                summary.innerHTML = `
                    <p class="font-bold">🚩 ${dayLine.Start_Point}</p>
                    <p class="font-bold text-[#8B1A1A]">🏁 ${dayLine.End_Point}</p>
                    <p class="pt-2 text-xs text-gray-400 italic">${dayLine.Description || ''}</p>
                `;
                document.getElementById('openFullDayNav').onclick = () => window.open(dayLine.Amap_Link);
            }

            // 2. 處理 SS 賽段
            dayData.filter(item => item.Section.startsWith('SS')).forEach(ss => {
                const card = document.createElement('div');
                card.className = "stage-card bg-white rounded-2xl shadow-md overflow-hidden p-6 relative";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-2xl font-black text-[#8B1A1A] italic">${ss.Section} <span class="text-sm font-bold text-gray-400 ml-2">${ss.T || ''}</span></h3>
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Special Stage</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-gray-800">${ss.D || ''}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${ss.Est_Time || ''}</p>
                        </div>
                    </div>

                    <div class="space-y-3 mb-6">
                        <div class="flex items-center gap-3">
                            <span class="w-6 h-6 bg-gray-800 text-white rounded text-[10px] flex items-center justify-center font-bold">START</span>
                            <p class="font-bold text-gray-700">${ss.Start_Point}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="w-6 h-6 border-2 border-gray-800 text-gray-800 rounded text-[10px] flex items-center justify-center font-bold">END</span>
                            <p class="font-bold text-gray-700">${ss.End_Point}</p>
                        </div>
                    </div>

                    <div class="description-box p-4 mb-6">
                        <p class="text-xs text-gray-400 font-bold uppercase mb-1 italic">🚩 賽段重點提醒</p>
                        <p class="text-sm text-gray-700 leading-relaxed font-medium">
                            ${ss.Description || '本路段無特殊提醒，請保持安全駕駛。'}
                        </p>
                    </div>

                    <button onclick="window.open('${ss.Amap_Link}')" class="w-full py-4 bg-gray-800 text-[#D4AF37] font-black rounded-xl mb-4 shadow-md active:bg-black transition-all">
                        導航至此賽段
                    </button>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="checkIn('${ss.Section}', 'START', '${ss.Start_Point}')" class="py-3 bg-[#8B1A1A] text-white rounded-lg font-bold text-sm shadow active:scale-95 transition-all">起點打卡</button>
                        <button onclick="checkIn('${ss.Section}', 'END', '${ss.End_Point}')" class="py-3 bg-white border-2 border-[#8B1A1A] text-[#8B1A1A] rounded-lg font-bold text-sm active:scale-95 transition-all">終點打卡</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function checkIn(section, type, locationName) {
            // 此處維持原本的打卡 logic (Fetch API 到 SheetDB)
            alert(`${section} - ${type} 打卡成功！`);
        }

        loadItinerary();
    </script>
</body>
</html>
