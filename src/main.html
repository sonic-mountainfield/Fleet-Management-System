<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 專業導航終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* 日期分頁樣式 */
        .date-tab { transition: all 0.3s; border-bottom: 4px solid transparent; opacity: 0.5; white-space: nowrap; }
        .date-tab.active { opacity: 1; border-color: #D4AF37; color: #D4AF37; transform: scale(1.1); }
        
        /* 賽段卡片 */
        .stage-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-radius: 2.5rem; overflow: hidden; }
        .ss-title { font-size: 3.5rem; line-height: 1; letter-spacing: -0.05em; font-style: italic; background: linear-gradient(to bottom, #8B1A1A, #5e1111); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 路點 A1 A2 標籤 */
        .loc-badge { background-color: #000; color: #fff; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; border: 1px solid #D4AF37; }
        
        .description-box { background: rgba(212, 175, 55, 0.05); border-left: 4px solid #D4AF37; }
        .btn-locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .nav-sticky { position: sticky; top: 0; z-index: 100; background: #8B1A1A; }
    </style>
</head>
<body class="pb-24">

    <nav class="nav-sticky shadow-2xl">
        <div class="p-4 flex justify-between items-center border-b border-white/10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded flex items-center justify-center font-black text-[#8B1A1A]">S</div>
                <h1 class="tech-font text-lg tracking-tighter">PILOT TERMINAL</h1>
            </div>
            <button onclick="switchMainTab('record')" class="text-[10px] font-bold border border-white/30 px-3 py-1 rounded-full">我的紀錄</button>
        </div>
        
        <div id="dateTabs" class="flex overflow-x-auto px-4 py-3 gap-6 scrollbar-hide bg-[#721515]">
            <button onclick="changeDay('4/27')" class="date-tab active font-black text-sm px-2" id="tab-4/27">4/27</button>
            <button onclick="changeDay('4/28')" class="date-tab font-black text-sm px-2" id="tab-4/28">4/28</button>
            <button onclick="changeDay('4/29')" class="date-tab font-black text-sm px-2" id="tab-4/29">4/29</button>
            <button onclick="changeDay('4/30')" class="date-tab font-black text-sm px-2" id="tab-4/30">4/30</button>
            <button onclick="changeDay('5/1')" class="date-tab font-black text-sm px-2" id="tab-5/1">5/1</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <div id="nav-view">
            <div id="dayNotice" class="hidden mb-6 p-4 rounded-2xl bg-blue-900/30 border border-blue-500/50 text-blue-400 text-xs font-bold text-center italic"></div>

            <section id="dayOverview" class="mb-10 bg-slate-800/50 rounded-[2.5rem] p-6 border border-slate-700">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="currentDateTitle" class="text-2xl font-black italic">4/27 全日路線</h2>
                    <button id="btnDayNav" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">觀看全日路線</button>
                </div>
                <div id="dayEndpoints" class="space-y-2 text-slate-400 font-bold text-sm mb-2 px-2"></div>
            </section>

            <div id="stageContainer" class="space-y-12">
                <div class="text-center py-20 animate-pulse text-slate-600 font-black tech-font">SYNCING SATELLITE...</div>
            </div>
        </div>

        <div id="record-view" class="hidden space-y-6">
            <button onclick="switchMainTab('nav')" class="text-[#D4AF37] font-bold text-sm mb-4 flex items-center gap-2">← 返回導航</button>
            <div class="bg-slate-800 p-8 rounded-[2.5rem] border-b-4 border-yellow-600">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">My Achievement</p>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="inputID" placeholder="DRIVER ID" class="flex-1 bg-slate-900 border border-slate-700 p-4 rounded-xl font-bold uppercase text-white">
                    <button onclick="fetchMyData()" class="bg-[#D4AF37] text-black px-6 rounded-xl font-black">查詢</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/20 p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">總里程</p>
                        <p id="totalKM" class="text-2xl font-black tech-font">0.0</p>
                    </div>
                    <div class="bg-black/20 p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">總工時</p>
                        <p id="totalTime" class="text-2xl font-black tech-font">0h 0m</p>
                    </div>
                </div>
            </div>
            <div id="splitTable" class="space-y-4"></div>
        </div>

    </main>

    <script>
        const API = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let itineraryData = [];

        function getToday() {
            const now = new Date();
            return `${now.getMonth() + 1}/${now.getDate()}`;
        }

        async function init() {
            try {
                const res = await fetch(`${API}?sheet=Itinerary`);
                itineraryData = await res.json();
                const today = getToday();
                const startDay = ["4/27","4/28","4/29","4/30","5/1"].includes(today) ? today : "4/27";
                changeDay(startDay);
            } catch (e) { console.error(e); }
        }

        function switchMainTab(view) {
            document.getElementById('nav-view').classList.toggle('hidden', view !== 'nav');
            document.getElementById('record-view').classList.toggle('hidden', view !== 'record');
        }

        function changeDay(day) {
            // 切換分頁樣式
            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');

            const today = getToday();
            const notice = document.getElementById('dayNotice');
            const parse = (d) => new Date(`2026/${d}`);
            const isPast = parse(day) < parse(today);
            const isFuture = parse(day) > parse(today);

            if (isPast) {
                notice.innerText = "⛔ 歷史路段：功能已鎖定";
                notice.classList.remove('hidden');
            } else if (isFuture) {
                notice.innerText = "📅 預覽模式：導航功能於當日開啟";
                notice.classList.remove('hidden');
            } else {
                notice.classList.add('hidden');
            }

            const dayData = itineraryData.filter(i => i.Day === day);
            renderUI(day, dayData, isPast, isFuture);
        }

        function renderUI(day, data, isPast, isFuture) {
            const container = document.getElementById('stageContainer');
            const dayTitle = document.getElementById('currentDateTitle');
            const dayEndpoints = document.getElementById('dayEndpoints');
            const btnDay = document.getElementById('btnDayNav');

            const dayInfo = data.find(i => i.Section === "DayLine");
            if (dayInfo) {
                dayTitle.innerText = `${day} 全日路線`;
                dayEndpoints.innerHTML = `<div>START: ${dayInfo.Start_Point}</div><div>FINISH: ${dayInfo.End_Point}</div>`;
                btnDay.onclick = () => window.location.href = dayInfo.Amap_Link;
                if(isPast) btnDay.classList.add('btn-locked'); else btnDay.classList.remove('btn-locked');
            }

            const ssStages = data.filter(i => i.Section.startsWith("SS"));
            container.innerHTML = ssStages.map((ss, index) => `
                <div class="stage-card">
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="ss-title tech-font">${ss.Section}</h3>
                            <div class="text-right">
                                <div class="text-3xl font-black tech-font text-white">${ss.D || '--'}</div>
                                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Distance KM</div>
                            </div>
                        </div>

                        <div class="space-y-8 mb-8 relative">
                            <div class="absolute left-4 top-8 bottom-8 w-0.5 bg-slate-700"></div>
                            
                            <div class="flex items-center gap-6 relative">
                                <div class="loc-badge">A${index}</div>
                                <div>
                                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Start Point</p>
                                    <p class="text-xl font-black text-white">${ss.Start_Point}</p>
                                </div>
                            </div>

                            <div class="flex items-center justify-between pl-14 pr-4">
                                <div class="text-xs font-black text-[#D4AF37] italic">EST. TIME: ${ss.Est_Time || '--'}</div>
                                <div class="text-[10px] font-bold text-slate-500 tech-font">#PILOT_DATA</div>
                            </div>

                            <div class="flex items-center gap-6 relative">
                                <div class="loc-badge" style="border-color:#8B1A1A">A${index+1}</div>
                                <div>
                                    <p class="text-[#8B1A1A] text-[10px] font-black uppercase tracking-widest">Finish Point</p>
                                    <p class="text-xl font-black text-white">${ss.End_Point}</p>
                                </div>
                            </div>
                        </div>

                        <div class="description-box p-5 mb-8">
                            <p class="text-[10px] font-black text-[#D4AF37] uppercase tracking-widest mb-2">Description / Notes</p>
                            <p class="text-sm font-bold leading-relaxed text-slate-300">${ss.Description || '本路段請維持通訊，注意環境變化。'}</p>
                        </div>

                        <button onclick="window.location.href='${ss.Amap_Link}'" class="w-full py-5 bg-white text-black font-black text-xl rounded-2xl mb-6 active:scale-95 transition-all ${isPast ? 'btn-locked' : ''}">
                            🧭 開啟導航
                        </button>

                        <div class="grid grid-cols-2 gap-4">
                            <button class="bg-[#8B1A1A] py-5 rounded-2xl font-black text-white ${(isPast || isFuture) ? 'btn-locked' : ''}">START 打卡</button>
                            <button class="bg-transparent border-2 border-[#8B1A1A] py-5 rounded-2xl font-black text-[#8B1A1A] ${(isPast || isFuture) ? 'btn-locked' : ''}">FINISH 打卡</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchMyData() {
            const id = document.getElementById('inputID').value.toUpperCase();
            if(!id) return;
            const res = await fetch(`${API}?sheet=CheckIns`);
            const checks = await res.json();
            const myEnds = checks.filter(r => r.CustomerID === id && r.Type === 'END');
            
            let km = 0, min = 0;
            myEnds.forEach(r => {
                const info = itineraryData.find(i => i.Section.toLowerCase() === r.Section.toLowerCase() && i.Day === r.Day);
                if(info) {
                    km += parseFloat(info.D || 0);
                    const t = info.Est_Time || "";
                    min += (parseInt(t.match(/(\d+)hr/)?.[1] || 0) * 60) + parseInt(t.match(/(\d+)min/)?.[1] || 0);
                }
            });
            document.getElementById('totalKM').innerText = km.toFixed(1);
            document.getElementById('totalTime').innerText = `${Math.floor(min/60)}h ${min%60}m`;
        }

        init();
    </script>
</body>
</html>
