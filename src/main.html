<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 專業導航終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0d0d0d; color: #e5e5e5; margin: 0; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .nav-header { position: sticky; top: 0; z-index: 100; background: #8B1A1A; border-bottom: 2px solid #D4AF37; }
        .date-tab { transition: 0.3s; opacity: 0.5; color: white; padding: 10px 16px; font-weight: 900; border-bottom: 3px solid transparent; font-size: 0.9rem; }
        .date-tab.active { opacity: 1; border-color: #D4AF37; color: #D4AF37; }
        
        .ss-header { 
            font-size: 2.8rem; font-style: italic; font-weight: 900; 
            background: linear-gradient(to bottom, #8B1A1A, #ff4d4d); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            line-height: 1.3; display: inline-block; margin-left: auto; 
        }
        .stage-card { background: #1a1a1a; border: 1px solid #333; border-radius: 2rem; margin-bottom: 1.2rem; overflow: hidden; }
        .route-label { font-size: 0.75rem; font-weight: 900; padding: 2px 8px; border-radius: 4px; margin-right: 8px; }
        .label-start { background: #D4AF37; color: #000; }
        .label-finish { background: #8B1A1A; color: #fff; }
        .btn-full-day { background: #2563eb; color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 900; font-size: 0.9rem; }

        .note-strip { background: rgba(212, 175, 55, 0.08); border: 1px dashed rgba(212, 175, 55, 0.5); border-radius: 0.8rem; padding: 0.8rem 1.2rem; margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 0.8rem; }
        .note-time { color: #D4AF37; font-family: 'Orbitron'; font-weight: 900; font-size: 0.85rem; min-width: 75px; }

        .loc-badge { background: #000; color: #D4AF37; border: 1px solid #D4AF37; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; }
        .line-connector { position: absolute; left: 17px; top: 40px; bottom: 40px; width: 2px; background: #334155; }
        .name-banner { background: linear-gradient(to right, #ffffff, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3rem; line-height: 1.2; }
        .description-box { background: rgba(212, 175, 55, 0.03); border-left: 4px solid #D4AF37; padding: 0.8rem; border-radius: 0 0.8rem 0.8rem 0; margin-bottom: 1.2rem; }
        
        .btn-locked { opacity: 0.15; pointer-events: none; filter: grayscale(1); }
        .status-alert { padding: 8px; font-size: 11px; font-weight: 900; text-align: center; border-radius: 10px; margin-bottom: 15px; }
        .btn-done { background: #059669 !important; color: white !important; pointer-events: none; }
        .past-overlay { filter: grayscale(1); opacity: 0.4; pointer-events: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="nav-header">
        <div class="p-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-white rounded-full flex items-center justify-center font-black text-[#8B1A1A] text-xs">陽</div>
                <h1 class="tech-font text-[10px] tracking-tight text-white italic">FLEET TERMINAL</h1>
            </div>
            <button onclick="switchTab('record')" class="text-[10px] font-black text-[#D4AF37] border border-[#D4AF37] px-3 py-1 rounded-full active:bg-[#D4AF37] active:text-black">🏆 觀看紀錄</button>
        </div>
        <div id="dateScroll" class="flex overflow-x-auto px-4 py-1 gap-4 bg-[#6b1414] scrollbar-hide">
            <button onclick="changeDay('4/27')" class="date-tab active" id="tab-4/27">4/27</button>
            <button onclick="changeDay('4/28')" class="date-tab" id="tab-4/28">4/28</button>
            <button onclick="changeDay('4/29')" class="date-tab" id="tab-4/29">4/29</button>
            <button onclick="changeDay('4/30')" class="date-tab" id="tab-4/30">4/30</button>
            <button onclick="changeDay('5/1')" class="date-tab" id="tab-5/1">5/1</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="nav-view">
            <div class="mt-4 mb-8 px-2">
                <p class="text-[9px] font-black text-gray-500 uppercase tracking-[0.4em] mb-1">COMMANDER</p>
                <h2 id="userNameDisplay" class="font-black name-banner italic">---</h2>
            </div>
            <div id="dateNotice" class="hidden"></div>
            <section id="dayOverviewSection" class="mb-8 bg-zinc-900 rounded-[2rem] p-8 border border-zinc-800">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentDayText" class="text-xl font-black italic text-[#D4AF37]">ROUTE PLAN</h2>
                    <button id="btnDayMap" class="btn-full-day">觀看全日路線</button>
                </div>
                <div id="dayEndpoints" class="space-y-4 border-l-4 border-gray-700 pl-6 text-white font-bold"></div>
            </section>
            <div id="stageContainer" class="space-y-1"></div>
        </div>

        <div id="record-view" class="hidden">
            <button onclick="switchTab('nav')" class="text-[#D4AF37] font-bold text-[10px] mb-6 flex items-center gap-1">← 返回導航</button>
            <section class="bg-zinc-900 p-8 rounded-[2.5rem] border-b-[8px] border-[#8B1A1A] shadow-2xl mb-8 text-white text-center">
                <h2 id="recordNameDisplay" class="text-3xl font-black italic mb-6">---</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-black/50 p-6 rounded-[1.5rem] border border-gray-800">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Total Distance</p>
                        <p id="statKM" class="text-2xl font-black tech-font">0.0 KM</p>
                    </div>
                    <div class="bg-black/50 p-6 rounded-[1.5rem] border border-gray-800">
                        <p class="text-[9px] text-gray-500 uppercase font-bold">Total Time</p>
                        <p id="statTime" class="text-2xl font-black tech-font text-[#D4AF37]">0h 0m</p>
                    </div>
                </div>
            </section>
            <div id="splitList" class="space-y-2"></div>
        </div>
    </main>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let itineraryData = [];
        let userCheckIns = [];
        const uID = localStorage.getItem('driverID');
        const uName = localStorage.getItem('driverName');

        if (!uID || !uName) window.location.href = '../index.html';

        async function init() {
            document.getElementById('userNameDisplay').innerText = uName;
            document.getElementById('recordNameDisplay').innerText = uName;
            
            try {
                const [itiRes, checkRes] = await Promise.all([
                    fetch(`${API_BASE}?sheet=Itinerary`),
                    fetch(`${API_BASE}?sheet=CheckIns`)
                ]);

                // 錯誤攔截：如果出現 403 報錯
                if (itiRes.status === 403) {
                    alert("⚠️ 存取被拒 (403)。請檢查 SheetDB 的 API 權限設定或白名單限制。");
                    return;
                }

                itineraryData = await itiRes.json();
                const allChecks = await checkRes.json();
                userCheckIns = allChecks.filter(r => r.CustomerID === uID);

                const now = new Date();
                const today = `${now.getMonth() + 1}/${now.getDate()}`;
                const validDays = ["4/27","4/28","4/29","4/30","5/1"];
                const startDay = validDays.includes(today) ? today : "4/27";
                changeDay(startDay);
            } catch (e) {
                console.error(e);
                alert("無法連線至資料庫，請檢查網路。");
            }
        }

        function switchTab(view) {
            document.getElementById('nav-view').classList.toggle('hidden', view !== 'nav');
            document.getElementById('record-view').classList.toggle('hidden', view !== 'record');
            document.getElementById('dateScroll').style.display = view === 'nav' ? 'flex' : 'none';
            if(view === 'record') loadPersonalData();
        }

        function changeDay(day) {
            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');
            
            const now = new Date();
            const todayStr = `${now.getMonth() + 1}/${now.getDate()}`;
            const parseDate = (str) => new Date(`2026/${str}`);
            const selectedDate = parseDate(day);
            const currentDate = parseDate(todayStr);

            const notice = document.getElementById('dateNotice');
            const overview = document.getElementById('dayOverviewSection');
            const container = document.getElementById('stageContainer');
            
            let status = "current";
            overview.classList.remove('past-overlay');
            container.classList.remove('past-overlay');

            if (selectedDate < currentDate) {
                status = "past";
                notice.className = "status-alert bg-gray-800 text-gray-500 block";
                notice.innerText = `⛔ ${day} 行程已結束`;
                overview.classList.add('past-overlay');
                container.classList.add('past-overlay');
            } else if (selectedDate > currentDate) {
                status = "future";
                notice.className = "status-alert bg-blue-900/30 text-blue-400 block";
                notice.innerText = `📅 預覽 ${day} 內容`;
            } else { notice.classList.add('hidden'); }

            const dayData = itineraryData.filter(i => i.Day === day);
            const dLine = dayData.find(i => i.Section === "DayLine");
            if (dLine) {
                document.getElementById('currentDayText').innerText = `${day} ROUTE`;
                document.getElementById('dayEndpoints').innerHTML = `
                    <div class="flex items-center"><span class="route-label label-start">Start</span><span class="route-text">${dLine.Start_Point}</span></div>
                    <div class="flex items-center"><span class="route-label label-finish">Finish</span><span class="route-text">${dLine.End_Point}</span></div>
                `;
                document.getElementById('btnDayMap').onclick = () => window.open(dLine.Amap_Link);
            }

            const mainContent = dayData.filter(i => i.Section !== "DayLine");
            let ssCounter = 0;
            container.innerHTML = mainContent.map((item) => {
                if (item.Section === "Note") {
                    return `<div class="note-strip"><div class="note-time">${item.T || ''}</div><div class="note-text">${item.Description || ''}</div></div>`;
                } else if (item.Section.startsWith("SS")) {
                    const hasStart = userCheckIns.some(c => c.Day === day && c.Section === item.Section && c.Type === 'START');
                    const hasEnd = userCheckIns.some(c => c.Day === day && c.Section === item.Section && c.Type === 'END');
                    const startBtnClass = hasStart ? "btn-done" : (status !== "current" ? "btn-locked" : "bg-[#8B1A1A]");
                    const endBtnClass = hasEnd ? "btn-done" : (status !== "current" ? "btn-locked" : "border border-[#333]");
                    const html = `
                        <div class="stage-card shadow-xl">
                            <div class="p-8">
                                <div class="flex flex-row-reverse justify-between items-start mb-8 text-white">
                                    <h3 class="ss-header tech-font">${item.Section}</h3>
                                    <div class="text-left">
                                        <div class="text-xl font-black tech-font">里程：${item.D}</div>
                                        <div class="text-sm font-black tech-font text-[#D4AF37]">時間：${item.Est_Time || '--'}</div>
                                    </div>
                                </div>
                                <div class="space-y-10 mb-8 relative">
                                    <div class="line-connector"></div>
                                    <div class="flex items-center gap-6 relative">
                                        <div class="loc-badge">A${ssCounter}</div>
                                        <div><p class="text-gray-500 text-[9px] font-black uppercase">Start Point</p><p class="text-xl font-black text-white leading-tight">${item.Start_Point}</p></div>
                                    </div>
                                    <div class="flex items-center gap-6 relative">
                                        <div class="loc-badge" style="border-color:#8B1A1A">A${ssCounter+1}</div>
                                        <div><p class="text-[#8B1A1A] text-[9px] font-black uppercase">Finish Point</p><p class="text-xl font-black text-white leading-tight">${item.End_Point}</p></div>
                                    </div>
                                </div>
                                ${item.Description ? `<div class="description-box"><p class="text-[9px] text-[#D4AF37] font-black uppercase mb-1">Pilot Notes</p><p class="text-sm font-bold text-gray-300">${item.Description}</p></div>` : ''}
                                <button onclick="window.open('${item.Amap_Link}')" class="w-full py-4 bg-white text-black font-black text-lg rounded-xl mb-4 italic">🧭 開啟導航</button>
                                <div class="grid grid-cols-2 gap-4">
                                    <button class="py-4 rounded-xl font-black text-white text-xs ${startBtnClass}">${hasStart ? "已打卡" : "START 打卡"}</button>
                                    <button class="py-4 rounded-xl font-black text-white text-xs ${endBtnClass}">${hasEnd ? "已完成" : "FINISH 打卡"}</button>
                                </div>
                            </div>
                        </div>`;
                    ssCounter++; return html;
                }
                return '';
            }).join('');
        }

        async function loadPersonalData() {
            const splitArea = document.getElementById('splitList');
            splitArea.innerHTML = '<p class="p-10 text-center animate-pulse text-gray-500">同步紀錄中...</p>';
            try {
                const res = await fetch(`${API_BASE}?sheet=CheckIns`);
                const allChecks = await res.json();
                const myEnds = allChecks.filter(r => r.CustomerID === uID && r.Type === 'END');
                let totalK = 0, totalM = 0;
                let html = "";
                ["4/27", "4/28", "4/29", "4/30", "5/1"].forEach(d => {
                    const dayDone = myEnds.filter(r => r.Day === d);
                    let dayK = 0;
                    dayDone.forEach(r => {
                        const info = itineraryData.find(i => i.Day === d && i.Section.toLowerCase() === r.Section.toLowerCase());
                        if(info) {
                            const dk = parseFloat(info.D) || 0;
                            dayK += dk; totalK += dk;
                            const hrMatch = info.Est_Time.match(/([\d.]+)\s*Hr/i);
                            if(hrMatch) totalM += parseFloat(hrMatch[1]) * 60;
                        }
                    });
                    html += `<div class="flex justify-between items-center p-6 bg-zinc-900 rounded-[1.5rem] border border-zinc-800 mb-1">
                        <div><p class="text-[9px] text-gray-500 mb-1 uppercase">${d}</p>
                        <p class="font-black ${dayDone.length > 0 ? 'text-[#D4AF37]' : 'text-zinc-800'} text-xs">${dayDone.length > 0 ? `✔️ 完成 ${dayDone.length} SS` : '---'}</p></div>
                        <div class="text-right text-lg font-black tech-font text-white">${dayK.toFixed(1)} KM</div>
                    </div>`;
                });
                document.getElementById('statKM').innerText = totalK.toFixed(1) + " KM";
                document.getElementById('statTime').innerText = `${Math.floor(totalM/60)}h ${Math.round(totalM%60)}m`;
                splitArea.innerHTML = html;
            } catch (e) { splitArea.innerHTML = "加載失敗"; }
        }

        init();
    </script>
</body>
</html>
