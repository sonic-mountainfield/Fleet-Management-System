<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽光小屋 - 專業路書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #F8F4E3; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); 
            font-family: sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 藏式風格卡片 */
        .tibet-card { border-top: 6px solid #D4AF37; border-bottom: 6px solid #8B1A1A; }
        
        /* 總路線卡片樣式 (藍色系) */
        .dayline-card { border-top: 6px solid #3385ff; border-bottom: 6px solid #3385ff; background-color: #f0f7ff; }
        
        /* 分頁標籤啟用樣式 */
        .tab-active { 
            background-color: #8B1A1A !important; 
            color: #D4AF37 !important; 
            border-bottom: 4px solid #D4AF37 !important;
        }

        .line-draw { 
            position: absolute; left: 27px; top: 60px; bottom: 60px; 
            border-left: 2px dashed #D1D5DB; z-index: 0; 
        }
    </style>
</head>
<body class="pb-28">

    <div class="fixed top-0 w-full z-50">
        <nav class="bg-[#8B1A1A] text-white p-4 flex justify-between items-center shadow-xl border-b border-[#D4AF37]">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-[#D4AF37] uppercase tracking-tighter opacity-80">Sunny House Fleet</span>
                <div class="flex items-baseline gap-2">
                    <span class="text-[10px] font-bold text-white/70">駕駛：</span>
                    <h2 id="userDisplay" class="text-2xl font-black text-[#D4AF37] tracking-wider drop-shadow-sm">載入中</h2>
                </div>
            </div>
            <button onclick="localStorage.clear(); window.location.href='../index.html'" 
                    class="text-[10px] font-bold border border-[#D4AF37] px-3 py-1 rounded-full text-[#D4AF37] active:bg-[#D4AF37] active:text-white transition-all">
                登出系統
            </button>
        </nav>
        
        <div id="dateTabs" class="bg-white border-b border-gray-200 flex overflow-x-auto no-scrollbar shadow-md"></div>
    </div>

    <div id="itineraryContainer" class="p-4 pt-36 space-y-6">
        <div class="text-center py-20 text-[#8B1A1A] font-bold italic animate-pulse">扎西德勒，正在加載賽程...</div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t border-[#D4AF37] flex justify-around py-4 shadow-2xl z-40">
        <div class="flex flex-col items-center text-[#8B1A1A]">
            <span class="text-2xl">🗺️</span>
            <span class="text-[10px] font-bold">每日路書</span>
        </div>
        <div class="flex flex-col items-center text-gray-300">
            <span class="text-2xl">📜</span>
            <span class="text-[10px] font-bold">榮譽證書</span>
        </div>
    </div>

    <script type="module">
        import { doCheckIn } from './api.js';

        let groupedData = {};

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '../index.html';
        } else {
            document.getElementById('userDisplay').innerText = user.NAME || user.Name || '成員';
        }

        // 高德地圖跳轉邏輯
        window.launchNavigation = function(url) {
            if (!url || url === "#" || url === "" || url === "undefined") {
                alert("⚠️ 此段路徑尚未設定高德連結");
                return;
            }
            const finalUrl = url.includes('?') ? `${url}&callnative=1` : `${url}?callnative=1`;
            window.location.href = finalUrl;
        };

        async function loadItinerary() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary');
                const allData = await response.json();
                
                groupedData = allData.reduce((acc, item) => {
                    const day = item.Day || item.day || "無日期";
                    if (!acc[day]) acc[day] = [];
                    acc[day].push(item);
                    return acc;
                }, {});

                renderTabs();
            } catch (e) {
                document.getElementById('itineraryContainer').innerHTML = "<p class='text-center text-red-600 font-bold'>資料讀取失敗</p>";
            }
        }

        function renderTabs() {
            const container = document.getElementById('dateTabs');
            const dates = Object.keys(groupedData);
            
            container.innerHTML = dates.map(date => `
                <div onclick="window.switchDate('${date}')" id="tab-${date}" 
                     class="flex-none px-6 py-4 text-sm font-bold text-gray-500 transition-all cursor-pointer border-b-4 border-transparent">
                    ${date}
                </div>
            `).join('');

            if (dates.length > 0) switchDate(dates[0]);
        }

        window.switchDate = function(selectedDate) {
            const tabs = document.querySelectorAll('#dateTabs > div');
            tabs.forEach(tab => tab.classList.remove('tab-active'));
            
            const activeTab = document.getElementById(`tab-${selectedDate}`);
            if (activeTab) {
                activeTab.classList.add('tab-active');
                activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }

            renderCards(groupedData[selectedDate]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCards(items) {
            const container = document.getElementById('itineraryContainer');
            container.innerHTML = items.map(ss => {
                const title = ss.T || ss.t || "未命名"; 
                const dist = ss.D || ss.d || "--";
                const sect = ss.Section || ss.section || "SS";
                const day = ss.Day || ss.day || "N/A";
                const isDayLine = sect.toLowerCase() === 'dayline';

                if (isDayLine) {
                    return `
                    <div class="dayline-card bg-white rounded-2xl shadow-xl p-6 relative mb-8 border-l-8 border-[#3385ff]">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-[#3385ff] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Day Total Route</span>
                            <span class="text-[#3385ff] font-black text-sm">今日路線概覽</span>
                        </div>

                        <div class="bg-blue-50 p-5 rounded-xl border border-blue-100">
                            <h4 class="font-black text-blue-900 text-xl mb-4">${title}</h4>
                            
                            <div class="space-y-2 mb-4 border-b border-blue-200 pb-4">
                                <div class="flex items-center gap-2">
                                    <span class="w-5 h-5 bg-black text-white text-[10px] rounded flex items-center justify-center font-bold">A0</span>
                                    <span class="text-sm font-bold text-blue-800">${ss.Start_Point || '未設定起點'}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="w-5 h-5 bg-black text-white text-[10px] rounded flex items-center justify-center font-bold">A1</span>
                                    <span class="text-sm font-bold text-blue-800">${ss.End_Point || '未設定終點'}</span>
                                </div>
                            </div>

                            <div class="flex gap-6 text-xs text-blue-700 font-bold mb-4">
                                <span>📏 總里程: ${dist}</span>
                                <span>⏱️ 總時間: ${ss.Est_Time || '--'}</span>
                            </div>

                            <div class="bg-white/60 p-3 rounded-lg border border-blue-200 mb-5 text-left">
                                <p class="text-[10px] font-black text-blue-400 uppercase mb-1">📋 Note / 注意事項</p>
                                <p class="text-xs text-blue-900 leading-relaxed font-medium">${ss.Description || '今日無特殊注意事項，扎西德勒！'}</p>
                            </div>

                            <button onclick="window.launchNavigation('${ss.Amap_Link}')" 
                                    class="w-full bg-[#3385ff] text-white py-4 rounded-xl font-bold text-sm flex justify-center gap-3 shadow-lg active:scale-95 transition-all">
                                <img src="https://img.icons8.com/color/48/amap.png" class="h-5 w-5">開啟全程導航
                            </button>
                        </div>
                    </div>`;
                } else {
                    const startKey = `checkin_${day}_${sect}_START`;
                    const endKey = `checkin_${day}_${sect}_END`;
                    const isStartDone = localStorage.getItem(startKey) === 'true';
                    const isEndDone = localStorage.getItem(endKey) === 'true';

                    return `
                    <div class="tibet-card bg-white rounded-2xl shadow-xl p-6 relative mb-8">
                        <div class="line-draw"></div>
                        <div class="flex justify-between items-center mb-6 relative z-10">
                            <span class="bg-[#8B1A1A] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Special Stage</span>
                            <span class="text-gray-400 font-bold text-xs">${sect}</span>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex-none flex items-center justify-center font-black text-xs shadow-lg">A0</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.Start_Point || '起點'}</div>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-[#8B1A1A] text-[#D4AF37] rounded-full flex-none flex items-center justify-center font-black text-xs shadow-lg border-2 border-[#D4AF37]">${sect}</div>
                            <div class="flex-1 bg-gray-50 p-4 rounded-xl border border-gray-100 text-left">
                                <h4 class="font-black text-[#8B1A1A] text-md">${title}</h4>
                                <p class="text-[11px] text-gray-500 font-bold mt-1">里程: ${dist} | 預計: ${ss.Est_Time || '--'}</p>
                                <p class="text-[11px] text-gray-400 mt-2 italic leading-relaxed">${ss.Description || ''}</p>
                                <button onclick="window.launchNavigation('${ss.Amap_Link}')" 
                                        class="w-full mt-4 bg-gray-800 text-white py-3 rounded-xl font-bold text-xs flex justify-center gap-2 shadow-lg">導航至此段</button>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 mb-2 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex-none flex items-center justify-center font-black text-xs shadow-lg">A1</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.End_Point || '終點'}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-100 relative z-10">
                            <button id="btn-${day}-${sect}-START" 
                                    onclick="handleCheckIn('${day}', '${sect}', 'START', '${ss.Start_Point}')" 
                                    ${isStartDone ? 'disabled' : ''}
                                    class="${isStartDone ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-[#8B1A1A] text-white shadow-xl active:bg-black'} py-4 rounded-xl font-bold text-xs transition-all">
                                ${isStartDone ? '✓ A0 已打卡' : 'A0 打卡'}
                            </button>
                            <button id="btn-${day}-${sect}-END" 
                                    onclick="handleCheckIn('${day}', '${sect}', 'END', '${ss.End_Point}')" 
                                    ${isEndDone ? 'disabled' : ''}
                                    class="${isEndDone ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'border-2 border-[#8B1A1A] text-[#8B1A1A] active:bg-gray-100'} py-4 rounded-xl font-bold text-xs transition-all">
                                ${isEndDone ? '✓ A1 已打卡' : 'A1 打卡'}
                            </button>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        window.handleCheckIn = async function(day, section, type, locName) {
            const btnId = `btn-${day}-${section}-${type}`;
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;

            btn.innerText = "寫入中...";
            btn.disabled = true;

            const success = await doCheckIn(section, type, locName);

            if (success) {
                const storageKey = `checkin_${day}_${section}_${type}`;
                localStorage.setItem(storageKey, 'true');

                btn.innerText = `✓ ${type === 'START' ? 'A0' : 'A1'} 已打卡`;
                btn.classList.remove('bg-[#8B1A1A]', 'text-[#8B1A1A]', 'border-[#8B1A1A]');
                btn.classList.add('bg-gray-300', 'text-gray-500', 'cursor-not-allowed', 'border-0');
                alert(`打卡成功！數據已安全寫入系統。`);
            } else {
                btn.innerText = originalText;
                btn.disabled = false;
                alert("打卡失敗，請檢查網路後重試");
            }
        };

        loadItinerary();
    </script>
</body>
</html>
