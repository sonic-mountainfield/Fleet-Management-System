<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>西藏自駕終端 - 陽光小屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.font.im/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background-color: #8B1A1A; }
        .tab-active { border-bottom: 4px solid #D4AF37; color: #D4AF37; }
        .stage-card { border-left: 10px solid #8B1A1A; }
        .description-box { background: #fffaf0; border-left: 4px solid #D4AF37; }
        .btn-locked { background-color: #cbd5e1 !important; color: #94a3b8 !important; pointer-events: none; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky-header text-white shadow-xl">
        <div class="p-4 flex justify-between items-center max-w-4xl mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center font-black text-[#8B1A1A] text-xs">SH</div>
                <h1 class="font-black tracking-tighter">自駕導航終端</h1>
            </div>
            <select id="dateSelector" onchange="updateDayView(this.value)" class="bg-black/30 text-white text-xs font-bold py-2 px-3 rounded-lg border border-white/20 outline-none">
                <option value="4/27">4月27日</option>
                <option value="4/28">4月28日</option>
                <option value="4/29">4月29日</option>
                <option value="4/30">4月30日</option>
                <option value="5/1">5月01日</option>
            </select>
        </div>
        <div class="flex border-t border-white/10 text-sm font-bold">
            <button onclick="switchTab('nav')" id="tab-nav" class="flex-1 py-3 tab-active">實時導航</button>
            <button onclick="switchTab('record')" id="tab-record" class="flex-1 py-3">我的冒險紀錄</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        
        <div id="nav-content" class="space-y-8">
            <div id="statusNotice" class="hidden p-4 rounded-2xl text-center font-bold text-xs border-2"></div>
            <section id="dayRouteSection" class="bg-white rounded-[2rem] shadow-xl border-t-[10px] border-blue-600 p-6">
                <h2 id="displayDayTitle" class="text-2xl font-black text-blue-900 mb-4">讀取中...</h2>
                <div id="dayPoints" class="bg-slate-50 p-4 rounded-2xl mb-6 text-sm font-bold text-slate-600"></div>
                <button id="btnFullDayNav" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg active:bg-blue-800 transition-all">觀看全日路線</button>
            </section>
            <div id="stageContainer" class="space-y-8"></div>
        </div>

        <div id="record-content" class="hidden space-y-6">
            <div class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-2xl border-b-4 border-[#D4AF37]">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Personal Dashboard</p>
                <div class="flex gap-3 mb-6">
                    <input type="text" id="myID" placeholder="輸入 ID (如: U100)" class="flex-1 bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-yellow-500 text-sm font-bold">
                    <button onclick="loadMyRecords()" class="bg-[#D4AF37] text-slate-900 px-6 py-3 rounded-xl font-black text-sm">查詢</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800 p-4 rounded-2xl">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">總里程 (KM)</p>
                        <p id="myTotalKM" class="text-2xl font-black tech-font text-white">0.0</p>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-2xl">
                        <p class="text-[10px] text-slate-500 font-bold uppercase">總時數</p>
                        <p id="myTotalTime" class="text-2xl font-black tech-font text-[#D4AF37]">0h 0m</p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">
                <div class="p-4 bg-slate-50 border-b font-black text-xs text-slate-400 uppercase tracking-widest">5-Day Performance Splits</div>
                <div id="mySplitTable" class="divide-y divide-slate-100">
                    <p class="p-10 text-center text-slate-300 italic">請輸入 ID 查詢您的輝煌紀錄</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let fullItinerary = [];

        function getTodayStr() {
            const now = new Date();
            return `${now.getMonth() + 1}/${now.getDate()}`;
        }

        async function init() {
            try {
                const response = await fetch(`${API_URL}?sheet=Itinerary`);
                fullItinerary = await response.json();
                const today = getTodayStr();
                const selector = document.getElementById('dateSelector');
                const validDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                const startDay = validDays.includes(today) ? today : "4/27";
                selector.value = startDay;
                updateDayView(startDay);
            } catch (e) { console.error(e); }
        }

        // 分頁切換邏輯
        function switchTab(tab) {
            document.getElementById('nav-content').classList.toggle('hidden', tab !== 'nav');
            document.getElementById('record-content').classList.toggle('hidden', tab !== 'record');
            document.getElementById('tab-nav').className = tab === 'nav' ? 'flex-1 py-3 tab-active' : 'flex-1 py-3';
            document.getElementById('tab-record').className = tab === 'record' ? 'flex-1 py-3 tab-active' : 'flex-1 py-3';
            // 切換分頁時自動隱藏日期選單(如果在紀錄頁)
            document.getElementById('dateSelector').style.visibility = tab === 'nav' ? 'visible' : 'hidden';
        }

        // --- 導航渲染邏輯 ---
        function updateDayView(selectedDay) {
            const today = getTodayStr();
            const notice = document.getElementById('statusNotice');
            const parseDate = (d) => new Date(`2026/${d}`);
            const isPast = parseDate(selectedDay) < parseDate(today);
            const isFuture = parseDate(selectedDay) > parseDate(today);

            if (isPast) {
                notice.className = "p-4 rounded-2xl text-center font-bold text-xs bg-gray-100 text-gray-500 block mb-6";
                notice.innerText = `⛔ ${selectedDay} 行程已結束，歷史紀錄僅供查閱。`;
            } else if (isFuture) {
                notice.className = "p-4 rounded-2xl text-center font-bold text-xs bg-blue-50 text-blue-600 block mb-6";
                notice.innerText = `📅 預覽 ${selectedDay} 行程（導航將於當日開啟）。`;
            } else { notice.classList.add('hidden'); }

            const dayData = fullItinerary.filter(item => item.Day === selectedDay);
            renderNavUI(selectedDay, dayData, isPast, isFuture);
        }

        function renderNavUI(day, data, isPast, isFuture) {
            const container = document.getElementById('stageContainer');
            const dayTitle = document.getElementById('displayDayTitle');
            const dayPoints = document.getElementById('dayPoints');
            const fullDayBtn = document.getElementById('btnFullDayNav');
            
            const dayInfo = data.find(i => i.Section === "DayLine");
            if (dayInfo) {
                dayTitle.innerText = `${day} 全日路線`;
                dayPoints.innerHTML = `<p>🚩 起點：${dayInfo.Start_Point}</p><p>🏁 終點：${dayInfo.End_Point}</p>`;
                fullDayBtn.onclick = () => window.location.href = dayInfo.Amap_Link;
                if(isPast) fullDayBtn.classList.add('btn-locked'); else fullDayBtn.classList.remove('btn-locked');
            }

            const ssStages = data.filter(i => i.Section.startsWith("SS"));
            container.innerHTML = ssStages.map(ss => `
                <div class="stage-card bg-white rounded-[2rem] shadow-xl p-6">
                    <div class="flex justify-between mb-4">
                        <span class="bg-[#8B1A1A] text-[#D4AF37] px-3 py-1 rounded-lg text-[10px] font-black uppercase">${ss.Section}</span>
                        <p class="text-xl font-black text-slate-900">${ss.D || '--'}</p>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800 mb-3 font-black">${ss.T || ''}</h3>
                    <div class="description-box p-4 mb-5 text-sm font-bold text-slate-600">${ss.Description || '請依照導航指示前進。'}</div>
                    <button onclick="window.location.href='${ss.Amap_Link}'" class="w-full py-4 bg-slate-900 text-[#D4AF37] rounded-xl font-black text-lg mb-4 ${isPast ? 'btn-locked' : ''}">🧭 導航至此賽段</button>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="bg-[#8B1A1A] text-white py-4 rounded-xl font-black ${(isPast || isFuture) ? 'btn-locked' : ''}">起點打卡</button>
                        <button class="bg-white border-2 border-[#8B1A1A] text-[#8B1A1A] py-3 rounded-xl font-black ${(isPast || isFuture) ? 'btn-locked' : ''}">終點打卡</button>
                    </div>
                </div>
            `).join('');
        }

        // --- 個人紀錄查詢邏輯 ---
        async function loadMyRecords() {
            const id = document.getElementById('myID').value.toUpperCase().trim();
            if(!id) return;
            document.getElementById('mySplitTable').innerHTML = '<p class="p-10 text-center animate-pulse">正在提取您的衛星軌跡...</p>';

            try {
                const [checkinRes, itineraryRes] = await Promise.all([
                    fetch(`${API_URL}?sheet=CheckIns`),
                    fetch(`${API_URL}?sheet=Itinerary`)
                ]);
                const checkins = await checkinRes.json();
                const itinerary = await itineraryRes.json();

                const targetDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                const myCheckins = checkins.filter(r => r.CustomerID === id && targetDays.includes(r.Day) && r.Type === 'END');

                let totalKM = 0;
                let totalMin = 0;
                let tableHtml = "";

                targetDays.forEach(day => {
                    const dayDone = myCheckins.filter(r => r.Day === day);
                    let dayKM = 0;
                    let dayMin = 0;
                    
                    dayDone.forEach(r => {
                        const info = itinerary.find(i => i.Day === day && i.Section.toLowerCase() === r.Section.toLowerCase());
                        if(info) {
                            const d = parseFloat(info.D || 0);
                            dayKM += d; totalKM += d;
                            const timeStr = info.Est_Time || "";
                            const hr = parseInt(timeStr.match(/(\d+)\s*hr/) ? timeStr.match(/(\d+)\s*hr/)[1] : 0);
                            const min = parseInt(timeStr.match(/(\d+)\s*min/) ? timeStr.match(/(\d+)\s*min/)[1] : 0);
                            dayMin += (hr * 60 + min); totalMin += (hr * 60 + min);
                        }
                    });

                    tableHtml += `
                        <div class="p-5 flex justify-between items-center">
                            <div>
                                <p class="text-xs font-black text-slate-400 uppercase">${day}</p>
                                <p class="font-black text-slate-700">${dayDone.length > 0 ? '✅ 賽段已完成' : '❌ 無打卡紀錄'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black tech-font">${dayKM.toFixed(1)} <span class="text-[10px]">KM</span></p>
                                <p class="text-[10px] font-bold text-slate-400">${Math.floor(dayMin/60)}h ${dayMin%60}m</p>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('myTotalKM').innerText = totalKM.toFixed(1);
                document.getElementById('myTotalTime').innerText = `${Math.floor(totalMin/60)}h ${totalMin%60}m`;
                document.getElementById('mySplitTable').innerHTML = tableHtml;

            } catch (e) { alert("數據提取失敗"); }
        }

        init();
    </script>
</body>
</html>
