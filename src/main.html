<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽光小屋 - 專業路書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #F8F4E3; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); 
            font-family: sans-serif;
        }
        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 藏式風格卡片 */
        .tibet-card { border-top: 6px solid #D4AF37; border-bottom: 6px solid #8B1A1A; }
        
        /* 總路線卡片樣式 */
        .dayline-card { border-top: 6px solid #3385ff; border-bottom: 6px solid #3385ff; background-color: #f0f7ff; }
        
        /* 分頁標籤啟用樣式 */
        .tab-active { 
            background-color: #8B1A1A !important; 
            color: #D4AF37 !important; 
            border-bottom: 4px solid #D4AF37 !important;
        }

        .line-draw { 
            position: absolute; left: 27px; top: 60px; bottom: 60px; 
            border-left: 2px dashed #D1D5DB; z-index: 0; 
        }
    </style>
</head>
<body class="pb-28">

    <div class="fixed top-0 w-full z-50">
        <nav class="bg-[#8B1A1A] text-white p-4 flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-xl font-bold tracking-widest text-white">陽光小屋車隊</h1>
                <p id="userDisplay" class="text-[10px] text-[#D4AF37] font-bold uppercase"></p>
            </div>
            <button onclick="localStorage.clear(); window.location.href='../index.html'" 
                    class="text-xs border border-[#D4AF37] px-3 py-1 rounded-full text-[#D4AF37]">登出</button>
        </nav>
        
        <div id="dateTabs" class="bg-white border-b border-gray-200 flex overflow-x-auto no-scrollbar shadow-md">
            </div>
    </div>

    <div id="itineraryContainer" class="p-4 pt-32 space-y-6">
        <div class="text-center py-20 text-[#8B1A1A] font-bold italic animate-pulse">扎西德勒，正在加載賽程...</div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t border-[#D4AF37] flex justify-around py-4 shadow-2xl z-40">
        <div class="flex flex-col items-center text-[#8B1A1A]">
            <span class="text-2xl">🗺️</span>
            <span class="text-[10px] font-bold">每日路書</span>
        </div>
        <div class="flex flex-col items-center text-gray-300">
            <span class="text-2xl">📜</span>
            <span class="text-[10px] font-bold">榮譽證書</span>
        </div>
    </div>

    <script type="module">
        import { doCheckIn } from './api.js';

        let groupedData = {};

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '../index.html';
        } else {
            document.getElementById('userDisplay').innerText = `隊員：${user.NAME || user.Name || '成員'}`;
        }

        // 高德地圖跳轉邏輯優化
        window.launchNavigation = function(url) {
            if (!url || url === "#" || url === "" || url === "undefined") {
                alert("⚠️ 此段路徑尚未設定高德連結");
                return;
            }
            // 強制加上 callnative=1 參數以嘗試開啟 APP
            const finalUrl = url.includes('?') ? `${url}&callnative=1` : `${url}?callnative=1`;
            window.location.href = finalUrl;
        };

        async function loadItinerary() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary');
                const allData = await response.json();
                
                // 按日期分組
                groupedData = allData.reduce((acc, item) => {
                    const day = item.Day || item.day || "無日期";
                    if (!acc[day]) acc[day] = [];
                    acc[day].push(item);
                    return acc;
                }, {});

                renderTabs();
            } catch (e) {
                document.getElementById('itineraryContainer').innerHTML = "<p class='text-center text-red-600 font-bold'>資料讀取失敗，請檢查 API</p>";
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('dateTabs');
            const dates = Object.keys(groupedData);
            
            tabsContainer.innerHTML = dates.map(date => `
                <div onclick="window.switchDate('${date}')" id="tab-${date}" 
                     class="flex-none px-6 py-4 text-sm font-bold text-gray-500 transition-all cursor-pointer border-b-4 border-transparent">
                    ${date}
                </div>
            `).join('');

            // 預設選取第一個日期
            if (dates.length > 0) switchDate(dates[0]);
        }

        window.switchDate = function(selectedDate) {
            const tabs = document.querySelectorAll('#dateTabs > div');
            tabs.forEach(tab => tab.classList.remove('tab-active'));
            
            const activeTab = document.getElementById(`tab-${selectedDate}`);
            if (activeTab) {
                activeTab.classList.add('tab-active');
                activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }

            renderCards(groupedData[selectedDate]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCards(items) {
            const container = document.getElementById('itineraryContainer');
            container.innerHTML = "";

            items.forEach(ss => {
                const displayTitle = ss.T || ss.t || "未命名"; 
                const displayDistance = ss.D || ss.d || "--";
                const displaySection = ss.Section || ss.section || "SS";
                const displayEstTime = ss.Est_Time || ss.est_time || "--";
                const displayDesc = ss.Description || ss.description || "";
                const displayLink = ss.Amap_Link || ss.amap_link || "#";

                const isDayLine = displaySection.toLowerCase() === 'dayline';
                const card = document.createElement('div');
                
                if (isDayLine) {
                    // --- DayLine 總路線模式 ---
                    card.className = "dayline-card bg-white rounded-2xl shadow-xl p-6 relative mb-8 border-l-8 border-[#3385ff]";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-[#3385ff] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">Day Route</span>
                            <span class="text-[#3385ff] font-black text-sm">今日總路線概覽</span>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <h4 class="font-black text-blue-900 text-lg">${displayTitle}</h4>
                            <div class="flex gap-6 mt-3 text-xs text-blue-700 font-bold">
                                <span>總里程: ${displayDistance}</span> <span>總時間: ${displayEstTime}</span>
                            </div>
                            <p class="text-xs text-blue-600/70 mt-3 italic leading-relaxed">${displayDesc}</p>
                            <button onclick="window.launchNavigation('${displayLink}')" 
                                    class="w-full mt-5 bg-[#3385ff] text-white py-4 rounded-xl font-bold text-sm flex justify-center gap-3 shadow-lg active:scale-95 transition-all">
                                <img src="https://img.icons8.com/color/48/amap.png" class="h-5 w-5">
                                開啟今日全程導航
                            </button>
                        </div>
                    `;
                } else {
                    // --- 標準 SS 賽段模式 ---
                    card.className = "tibet-card bg-white rounded-2xl shadow-xl p-6 relative mb-8";
                    card.innerHTML = `
                        <div class="line-draw"></div>
                        <div class="flex justify-between items-center mb-6 relative z-10">
                            <span class="bg-[#8B1A1A] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Special Stage</span>
                            <span class="text-gray-400 font-bold text-xs">${displaySection}</span>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex-none flex items-center justify-center font-black text-xs shadow-lg">A0</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.Start_Point || '起點'}</div>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-[#8B1A1A] text-[#D4AF37] rounded-full flex-none flex items-center justify-center font-black text-xs shadow-lg border-2 border-[#D4AF37]">${displaySection}</div>
                            <div class="flex-1 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <h4 class="font-black text-[#8B1A1A] text-md">${displayTitle}</h4>
                                <p class="text-[11px] text-gray-500 font-bold mt-1">里程: ${displayDistance} | 預計: ${displayEstTime}</p>
                                <p class="text-[11px] text-gray-400 mt-2 italic leading-relaxed">${displayDesc}</p>
                                <button onclick="window.launchNavigation('${displayLink}')" 
                                        class="w-full mt-4 bg-gray-800 text-white py-3 rounded-xl font-bold text-xs flex justify-center gap-2 shadow-lg">
                                    導航至此段
                                </button>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 mb-2 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex-none flex items-center justify-center font-black text-xs shadow-lg">A1</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.End_Point || '終點'}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-100 relative z-10">
                            <button onclick="handleCheckIn('${displaySection}', 'START', '${ss.Start_Point}')" 
                                    class="bg-[#8B1A1A] text-white py-4 rounded-xl font-bold text-xs shadow-xl active:bg-black transition-all">A0 打卡</button>
                            <button onclick="handleCheckIn('${displaySection}', 'END', '${ss.End_Point}')" 
                                    class="border-2 border-[#8B1A1A] text-[#8B1A1A] py-4 rounded-xl font-bold text-xs active:bg-gray-100 transition-all">A1 打卡</button>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        window.handleCheckIn = async function(section, type, locName) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "寫入中...";
            btn.disabled = true;
            const success = await doCheckIn(section, type, locName);
            if (success) {
                btn.innerText = "✓ 已打卡";
                btn.classList.add('opacity-50');
                alert(`打卡成功！`);
            } else {
                btn.innerText = originalText;
                btn.disabled = false;
                alert("打卡失敗，請檢查網路");
            }
        };

        loadItinerary();
    </script>
</body>
</html>
