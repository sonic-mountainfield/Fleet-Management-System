<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陽光小屋 - 專業路書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #F8F4E3; 
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); 
            font-family: sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tibet-card { border-top: 6px solid #D4AF37; border-bottom: 6px solid #8B1A1A; }
        .dayline-card { border-top: 6px solid #3385ff; border-bottom: 6px solid #3385ff; background-color: #f0f7ff; }
        
        .tab-active { 
            background-color: #8B1A1A !important; 
            color: #D4AF37 !important; 
            border-bottom: 4px solid #D4AF37 !important;
        }
        .line-draw { 
            position: absolute; left: 27px; top: 60px; bottom: 60px; 
            border-left: 2px dashed #D1D5DB; z-index: 0; 
        }
    </style>
</head>
<body class="pb-28">

    <div class="fixed top-0 w-full z-50">
        <nav class="bg-[#8B1A1A] text-white p-4 flex justify-between items-center shadow-xl border-b border-[#D4AF37]">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-[#D4AF37] uppercase tracking-tighter opacity-80">Sunny House Fleet</span>
                <div class="flex items-baseline gap-2">
                    <span class="text-[10px] font-bold text-white/70">駕駛：</span>
                    <h2 id="userDisplay" class="text-2xl font-black text-[#D4AF37] tracking-wider drop-shadow-sm">載入中</h2>
                </div>
            </div>
            <button onclick="localStorage.clear(); window.location.href='../index.html'" 
                    class="text-[10px] font-bold border border-[#D4AF37] px-3 py-1 rounded-full text-[#D4AF37] active:bg-[#D4AF37] active:text-white transition-all">
                登出系統
            </button>
        </nav>
        
        <div id="dateTabs" class="bg-white border-b border-gray-200 flex overflow-x-auto no-scrollbar shadow-md"></div>
    </div>

    <div id="itineraryContainer" class="p-4 pt-36 space-y-6">
        <div class="text-center py-20 text-[#8B1A1A] font-bold italic animate-pulse">扎西德勒，加載路書中...</div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t border-[#D4AF37] flex justify-around py-4 shadow-2xl z-40">
        <div class="flex flex-col items-center text-[#8B1A1A]">
            <span class="text-2xl">🗺️</span>
            <span class="text-[10px] font-bold">每日路書</span>
        </div>
        <div class="flex flex-col items-center text-gray-300">
            <span class="text-2xl">📜</span>
            <span class="text-[10px] font-bold">榮譽證書</span>
        </div>
    </div>

    <script type="module">
        import { doCheckIn } from './api.js';

        let groupedData = {};

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '../index.html';
        } else {
            // 這裡的名字會變得很顯眼
            document.getElementById('userDisplay').innerText = user.NAME || user.Name || '成員';
        }

        window.launchNavigation = function(url) {
            if (!url || url === "#" || url === "undefined") {
                alert("⚠️ 此段路徑尚未設定高德連結");
                return;
            }
            const finalUrl = url.includes('?') ? `${url}&callnative=1` : `${url}?callnative=1`;
            window.location.href = finalUrl;
        };

        async function loadItinerary() {
            try {
                const response = await fetch('https://sheetdb.io/api/v1/poo9epu17583p?sheet=Itinerary');
                const allData = await response.json();
                groupedData = allData.reduce((acc, item) => {
                    const day = item.Day || item.day || "無日期";
                    if (!acc[day]) acc[day] = [];
                    acc[day].push(item);
                    return acc;
                }, {});
                renderTabs();
            } catch (e) {
                document.getElementById('itineraryContainer').innerHTML = "<p class='text-center text-red-600 font-bold'>資料讀取失敗</p>";
            }
        }

        function renderTabs() {
            const container = document.getElementById('dateTabs');
            const dates = Object.keys(groupedData);
            container.innerHTML = dates.map(date => `
                <div onclick="window.switchDate('${date}')" id="tab-${date}" 
                     class="flex-none px-6 py-4 text-sm font-bold text-gray-500 cursor-pointer border-b-4 border-transparent transition-all">
                    ${date}
                </div>
            `).join('');
            if (dates.length > 0) switchDate(dates[0]);
        }

        window.switchDate = function(selectedDate) {
            document.querySelectorAll('#dateTabs > div').forEach(tab => tab.classList.remove('tab-active'));
            const activeTab = document.getElementById(`tab-${selectedDate}`);
            if (activeTab) {
                activeTab.classList.add('tab-active');
                activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }
            renderCards(groupedData[selectedDate]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderCards(items) {
            const container = document.getElementById('itineraryContainer');
            container.innerHTML = items.map(ss => {
                const title = ss.T || ss.t || "未命名"; 
                const dist = ss.D || ss.d || "--";
                const sect = ss.Section || ss.section || "SS";
                const isDayLine = sect.toLowerCase() === 'dayline';

                if (isDayLine) {
                    return `
                    <div class="dayline-card bg-white rounded-2xl shadow-xl p-6 relative mb-8 border-l-8 border-[#3385ff]">
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-[#3385ff] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">Day Route</span>
                            <span class="text-[#3385ff] font-black text-sm">今日總路線</span>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <h4 class="font-black text-blue-900 text-lg">${title}</h4>
                            <div class="flex gap-6 mt-3 text-xs text-blue-700 font-bold">
                                <span>總里程: ${dist}</span> <span>預計時間: ${ss.Est_Time || '--'}</span>
                            </div>
                            <p class="text-xs text-blue-600/70 mt-3 italic leading-relaxed">${ss.Description || ''}</p>
                            <button onclick="window.launchNavigation('${ss.Amap_Link}')" 
                                    class="w-full mt-5 bg-[#3385ff] text-white py-4 rounded-xl font-bold text-sm flex justify-center gap-3 shadow-lg active:scale-95 transition-all">
                                <img src="https://img.icons8.com/color/48/amap.png" class="h-5 w-5">開啟全程導航
                            </button>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="tibet-card bg-white rounded-2xl shadow-xl p-6 relative mb-8">
                        <div class="line-draw"></div>
                        <div class="flex justify-between items-center mb-6 relative z-10">
                            <span class="bg-[#8B1A1A] text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Special Stage</span>
                            <span class="text-gray-400 font-bold text-xs">${sect}</span>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex items-center justify-center font-black text-xs shadow-lg">A0</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.Start_Point || '起點'}</div>
                        </div>
                        <div class="flex items-start gap-4 mb-8 relative z-10">
                            <div class="w-8 h-8 bg-[#8B1A1A] text-[#D4AF37] rounded-full flex items-center justify-center font-black text-xs shadow-lg border-2 border-[#D4AF37]">${sect}</div>
                            <div class="flex-1 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <h4 class="font-black text-[#8B1A1A] text-md">${title}</h4>
                                <p class="text-[11px] text-gray-500 font-bold mt-1">里程: ${dist} | 預計: ${ss.Est_Time || '--'}</p>
                                <p class="text-[11px] text-gray-400 mt-2 italic leading-relaxed">${ss.Description || ''}</p>
                                <button onclick="window.launchNavigation('${ss.Amap_Link}')" 
                                        class="w-full mt-4 bg-gray-800 text-white py-3 rounded-xl font-bold text-xs flex justify-center gap-2 shadow-lg">導航至此段</button>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 mb-2 relative z-10">
                            <div class="w-8 h-8 bg-black text-white rounded flex-none flex items-center justify-center font-black text-xs shadow-lg">A1</div>
                            <div class="flex-1 text-md font-bold text-gray-800">${ss.End_Point || '終點'}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-100 relative z-10">
                            <button onclick="handleCheckIn('${sect}', 'START', '${ss.Start_Point}')" 
                                    class="bg-[#8B1A1A] text-white py-4 rounded-xl font-bold text-xs shadow-xl active:bg-black transition-all">A0 打卡</button>
                            <button onclick="handleCheckIn('${sect}', 'END', '${ss.End_Point}')" 
                                    class="border-2 border-[#8B1A1A] text-[#8B1A1A] py-4 rounded-xl font-bold text-xs active:bg-gray-100 transition-all">A1 打卡</button>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        window.handleCheckIn = async function(section, type, locName) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "寫入中...";
            btn.disabled = true;
            const success = await doCheckIn(section, type, locName);
            if (success) {
                btn.innerText = "✓ 已打卡";
                btn.classList.add('opacity-50');
                alert(`打卡成功！`);
            } else {
                btn.innerText = originalText;
                btn.disabled = false;
                alert("打卡失敗，請檢查網路");
            }
        };

        loadItinerary();
    </script>
</body>
</html>
