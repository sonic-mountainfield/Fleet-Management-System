<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUNNY HOUSE - 專業導航終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0d0d0d; color: #e5e5e5; margin: 0; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* 頂部固定導航 */
        .nav-header { position: sticky; top: 0; z-index: 100; background: #8B1A1A; border-bottom: 3px solid #D4AF37; }
        
        /* 日期分頁樣式 */
        .date-tab { transition: all 0.3s; border-bottom: 4px solid transparent; opacity: 0.5; white-space: nowrap; cursor: pointer; color: white; padding: 12px 20px; font-weight: 900; }
        .date-tab.active { opacity: 1; border-color: #D4AF37; color: #D4AF37; transform: scale(1.1); }
        
        /* 賽段卡片 */
        .stage-card { background: #1a1a1a; border: 1px solid #333; border-radius: 2.5rem; overflow: hidden; margin-bottom: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .ss-header { font-size: 3.8rem; line-height: 1; font-style: italic; font-weight: 900; background: linear-gradient(to bottom, #8B1A1A, #ff4d4d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* A0/A1 路點連接質感 */
        .loc-badge { background: #000; color: #D4AF37; border: 1px solid #D4AF37; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .line-connector { position: absolute; left: 20px; top: 45px; bottom: 45px; width: 2px; background: #334155; }
        
        /* 描述區塊 */
        .description-box { background: rgba(212, 175, 55, 0.05); border-left: 6px solid #D4AF37; padding: 1.5rem; border-radius: 0 1.5rem 1.5rem 0; }
        
        /* 名字動態橫幅 */
        .name-banner { background: linear-gradient(to right, #ffffff, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 4rem; line-height: 1.1; letter-spacing: -2px; }
        
        .btn-locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="nav-header shadow-2xl">
        <div class="p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center font-black text-[#8B1A1A]">陽</div>
                <h1 class="tech-font text-xs tracking-tight text-white italic">PILOT TERMINAL</h1>
            </div>
            <button onclick="switchTab('record')" class="text-xs font-black text-[#D4AF37] border-2 border-[#D4AF37] px-4 py-1 rounded-full active:bg-[#D4AF37] active:text-black transition-all">🏆 冒險紀錄</button>
        </div>
        
        <div id="dateScroll" class="flex overflow-x-auto px-6 py-2 gap-8 bg-[#6b1414] scrollbar-hide border-t border-white/5">
            <button onclick="changeDay('4/27')" class="date-tab active text-lg" id="tab-4/27">4/27</button>
            <button onclick="changeDay('4/28')" class="date-tab text-lg" id="tab-4/28">4/28</button>
            <button onclick="changeDay('4/29')" class="date-tab text-lg" id="tab-4/29">4/29</button>
            <button onclick="changeDay('4/30')" class="date-tab text-lg" id="tab-4/30">4/30</button>
            <button onclick="changeDay('5/1')" class="date-tab text-lg" id="tab-5/1">5/1</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-2">
        
        <div id="nav-view">
            <div class="mt-6 mb-10 px-2">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.5em] mb-1">Authenticated Commander</p>
                <h2 id="userNameDisplay" class="font-black name-banner italic">讀取中...</h2>
            </div>

            <section class="mb-12 bg-zinc-900 rounded-[2.5rem] p-8 border border-zinc-800 shadow-inner">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="currentDayText" class="text-2xl font-black italic tracking-tighter text-[#D4AF37]">ROUTE PLAN</h2>
                    <button id="btnDayMap" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm active:scale-95 transition-all">全日大路線</button>
                </div>
                <div id="dayEndpoints" class="space-y-2 text-gray-400 font-bold text-lg border-l-4 border-gray-700 pl-6"></div>
            </section>

            <div id="stageContainer" class="space-y-4"></div>
        </div>

        <div id="record-view" class="hidden">
            <button onclick="switchTab('nav')" class="text-[#D4AF37] font-bold text-sm mb-8 flex items-center gap-2">← BACK TO NAVIGATION</button>
            
            <section class="bg-zinc-900 p-10 rounded-[3rem] border-b-[12px] border-[#8B1A1A] shadow-2xl mb-10">
                <p class="text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Driver Achievement</p>
                <h2 id="recordNameDisplay" class="text-5xl font-black text-white mb-10 italic">---</h2>
                
                <div class="grid grid-cols-2 gap-8">
                    <div class="bg-black/50 p-8 rounded-[2rem] border border-gray-800">
                        <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Total Distance</p>
                        <p id="statKM" class="text-5xl font-black tech-font text-white">0.0<small class="text-xs ml-1 italic text-gray-500">KM</small></p>
                    </div>
                    <div class="bg-black/50 p-8 rounded-[2rem] border border-gray-800">
                        <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Total Time</p>
                        <p id="statTime" class="text-5xl font-black tech-font text-[#D4AF37]">0h 0m</p>
                    </div>
                </div>
            </section>

            <div id="splitList" class="space-y-3 px-2"></div>
        </div>

    </main>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let itineraryData = [];

        // 從 LocalStorage 獲取登入資訊
        const uID = localStorage.getItem('driverID');
        const uName = localStorage.getItem('driverName');

        // 安全檢查
        if (!uID || !uName || uName === "undefined") {
            window.location.href = 'index.html';
        }

        async function init() {
            document.getElementById('userNameDisplay').innerText = uName;
            document.getElementById('recordNameDisplay').innerText = uName;

            try {
                const res = await fetch(`${API_URL}?sheet=Itinerary`);
                itineraryData = await res.json();
                
                const today = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
                const validDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                const startDay = validDays.includes(today) ? today : "4/27";
                
                changeDay(startDay);
            } catch (e) { console.error("數據同步失敗"); }
        }

        function switchTab(view) {
            document.getElementById('nav-view').classList.toggle('hidden', view !== 'nav');
            document.getElementById('record-view').classList.toggle('hidden', view !== 'record');
            document.getElementById('dateScroll').style.display = view === 'nav' ? 'flex' : 'none';
            if(view === 'record') loadPersonalData();
        }

        function changeDay(day) {
            document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');

            const dayData = itineraryData.filter(i => i.Day === day);
            renderNavUI(day, dayData);
        }

        function renderNavUI(day, data) {
            const container = document.getElementById('stageContainer');
            const dayTitle = document.getElementById('currentDayText');
            const dayEndpoints = document.getElementById('dayEndpoints');
            const btnDayMap = document.getElementById('btnDayMap');

            // 渲染全日路線
            const dayInfo = data.find(i => i.Section === "DayLine");
            if (dayInfo) {
                dayTitle.innerText = `${day} ROUTE`;
                dayEndpoints.innerHTML = `<p>🚩 START: ${dayInfo.Start_Point}</p><p>🏁 FINISH: ${dayInfo.End_Point}</p>`;
                btnDayMap.onclick = () => window.open(dayInfo.Amap_Link);
            }

            // 渲染 SS 賽段 (A0-A1 排版)
            const ssStages = data.filter(i => i.Section.startsWith("SS"));
            container.innerHTML = ssStages.map((ss, idx) => `
                <div class="stage-card shadow-2xl">
                    <div class="p-10">
                        <div class="flex justify-between items-start mb-10">
                            <h3 class="ss-header tech-font">${ss.Section}</h3>
                            <div class="text-right">
                                <div class="text-5xl font-black tech-font text-white">${ss.D || '--'}</div>
                                <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">KM</div>
                            </div>
                        </div>

                        <div class="space-y-12 mb-12 relative">
                            <div class="line-connector"></div>
                            
                            <div class="flex items-center gap-8 relative">
                                <div class="loc-badge">A${idx}</div>
                                <div>
                                    <p class="text-gray-500 text-[10px] font-black uppercase">Start Point</p>
                                    <p class="text-3xl font-black text-white leading-tight">${ss.Start_Point}</p>
                                </div>
                            </div>

                            <div class="pl-20">
                                <span class="text-sm font-black text-[#D4AF37] italic uppercase tracking-tighter">Est. Time: ${ss.Est_Time || '--'}</span>
                            </div>

                            <div class="flex items-center gap-8 relative">
                                <div class="loc-badge" style="border-color:#8B1A1A">A${idx+1}</div>
                                <div>
                                    <p class="text-[#8B1A1A] text-[10px] font-black uppercase">Finish Point</p>
                                    <p class="text-3xl font-black text-white leading-tight">${ss.End_Point}</p>
                                </div>
                            </div>
                        </div>

                        <div class="description-box mb-10">
                            <p class="text-[10px] font-black text-[#D4AF37] uppercase tracking-widest mb-3">Pilot Notes</p>
                            <p class="text-lg font-bold leading-relaxed text-gray-300">${ss.Description || '依照領隊指示安全行駛。'}</p>
                        </div>

                        <button onclick="window.open('${ss.Amap_Link}')" class="w-full py-7 bg-white text-black font-black text-2xl rounded-[1.5rem] mb-6 shadow-2xl active:scale-95 transition-all">🧭 開啟高德導航</button>

                        <div class="grid grid-cols-2 gap-5">
                            <button class="bg-[#8B1A1A] py-6 rounded-[1.5rem] font-black text-white text-lg shadow-lg">START 打卡</button>
                            <button class="border-2 border-[#8B1A1A] py-6 rounded-[1.5rem] font-black text-[#8B1A1A] text-lg">FINISH 打卡</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadPersonalData() {
            const splitArea = document.getElementById('splitList');
            splitArea.innerHTML = '<p class="p-20 text-center animate-pulse text-gray-600 font-bold uppercase">Syncing Satellite Data...</p>';
            
            try {
                const res = await fetch(`${API_URL}?sheet=CheckIns`);
                const allChecks = await res.json();
                const myEnds = allChecks.filter(r => r.CustomerID === uID && r.Type === 'END');
                
                let totalK = 0, totalM = 0;
                const days = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                let html = "";

                days.forEach(d => {
                    const dayDone = myEnds.filter(r => r.Day === d);
                    let dKm = 0;
                    dayDone.forEach(r => {
                        const info = itineraryData.find(i => i.Section.toLowerCase() === r.Section.toLowerCase() && i.Day === r.Day);
                        if(info) {
                            const dk = parseFloat(info.D || 0);
                            dKm += dk; totalK += dk;
                            totalM += (parseInt(info.Est_Time.match(/(\d+)hr/)?.[1] || 0) * 60) + parseInt(info.Est_Time.match(/(\d+)min/)?.[1] || 0);
                        }
                    });
                    html += `
                        <div class="flex justify-between items-center p-8 bg-zinc-900 rounded-[2rem] border border-zinc-800 mb-3">
                            <div>
                                <p class="text-[10px] font-black text-gray-500 mb-1 uppercase tracking-widest">${d}</p>
                                <p class="font-black ${dayDone.length > 0 ? 'text-[#D4AF37]' : 'text-zinc-700'}">${dayDone.length > 0 ? '✔️ STAGE COMPLETE' : '---'}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black tech-font text-white">${dKm.toFixed(1)} <small class="text-xs">KM</small></div>
                                <div class="text-[10px] font-bold text-gray-600">${dayDone.length} SESSIONS</div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('statKM').innerText = totalK.toFixed(1);
                document.getElementById('statTime').innerText = `${Math.floor(totalM/60)}h ${totalM%60}m`;
                splitArea.innerHTML = html;
            } catch (e) { splitArea.innerHTML = "數據加載出錯"; }
        }

        init();
    </script>
</body>
</html>
