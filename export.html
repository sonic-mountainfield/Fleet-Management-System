<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHF - 專業數據指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;700&display=swap');
        body { background-color: #0f172a; font-family: 'Noto Sans TC', sans-serif; color: #f8fafc; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .data-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
        .split-row:nth-child(even) { background: rgba(51, 65, 85, 0.3); }
        .accent-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .print-only { display: none; }
        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
            body { background: white; color: black; }
            .data-card { border: 1px solid #ccc; background: white; }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 no-print">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
                <div class="space-y-2">
                    <h1 class="text-3xl font-black tracking-tighter accent-gold">FLEET TELEMETRY <span class="text-white">CENTER</span></h1>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">西藏珠峰環線 - 專業數據指揮部</p>
                </div>
                <div class="flex w-full md:w-auto gap-2">
                    <input type="text" id="targetID" placeholder="輸入駕駛員 ID (如: U100)" 
                           class="bg-slate-900 border border-slate-600 px-6 py-3 rounded-xl outline-none focus:border-yellow-500 flex-1 md:w-64 text-white font-bold">
                    <button onclick="analyzeDriverData()" class="bg-gold text-slate-900 px-8 py-3 rounded-xl font-black hover:bg-white transition-all">
                        查詢數據
                    </button>
                </div>
            </div>
        </header>

        <div id="resultsArea" class="hidden space-y-8 animate-in fade-in duration-700">
            <div class="data-card p-8 rounded-[2rem] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-8 border-b-4 border-yellow-600">
                <div class="text-center md:text-left">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Driver Profile</p>
                    <h2 id="dispName" class="text-5xl font-black mb-2">---</h2>
                    <div class="flex gap-3 justify-center md:justify-start">
                        <span id="dispID" class="bg-slate-700 px-3 py-1 rounded text-xs font-mono text-yellow-500">ID: ---</span>
                        <span class="bg-green-900/30 text-green-400 px-3 py-1 rounded text-xs font-bold border border-green-800">OFFICIAL FINISHER</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6 w-full md:w-auto">
                    <div class="text-center">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">總里程 (Total)</p>
                        <p class="text-3xl font-black tech-font text-white"><span id="totalKM">0</span><small class="text-xs ml-1">KM</small></p>
                    </div>
                    <div class="text-center border-x border-slate-700 px-6">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">完賽段 (Stages)</p>
                        <p class="text-3xl font-black tech-font text-white"><span id="totalSS">0</span></p>
                    </div>
                    <div class="text-center col-span-2 md:col-span-1">
                        <p class="text-slate-500 text-[10px] font-bold uppercase">總時數 (Duration)</p>
                        <p id="totalTime" class="text-3xl font-black tech-font accent-gold">0h 0m</p>
                    </div>
                </div>
            </div>

            <div class="data-card rounded-[2rem] overflow-hidden shadow-2xl">
                <div class="bg-slate-800/50 p-6 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="font-black tracking-widest text-sm uppercase">5-Day Performance Splits</h3>
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-gold"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    </div>
                </div>
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-[10px] font-black uppercase tracking-widest">
                        <tr>
                            <th class="p-6">日期 (Date)</th>
                            <th class="p-6">當日航段 (Section)</th>
                            <th class="p-6">單日里程 (Split KM)</th>
                            <th class="p-6">單日工時 (Split Time)</th>
                            <th class="p-6 text-right">狀態 (Status)</th>
                        </tr>
                    </thead>
                    <tbody id="splitTableBody" class="text-sm font-medium">
                        </tbody>
                </table>
            </div>

            <div class="text-center no-print pb-20">
                <button onclick="window.print()" class="text-slate-400 hover:text-white font-bold text-xs uppercase tracking-widest border-b border-slate-700 pb-1">
                    Export to PDF Report
                </button>
            </div>
        </div>

        <div id="welcomeMsg" class="py-40 text-center">
            <div class="inline-block p-6 rounded-full bg-slate-800 mb-6">
                <svg class="w-12 h-12 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <p class="text-slate-500 font-bold tracking-widest uppercase">請輸入隊員 ID 開始精密數據分析</p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/poo9epu17583p';

        async function analyzeDriverData() {
            const id = document.getElementById('targetID').value.toUpperCase().trim();
            if(!id) return;

            // 顯示載入動畫
            document.getElementById('welcomeMsg').innerHTML = "<p class='animate-pulse text-yellow-500 font-black'>正在連接衛星數據庫...</p>";

            try {
                const [checkinRes, userRes, itineraryRes] = await Promise.all([
                    fetch(`${API_BASE}?sheet=CheckIns`),
                    fetch(`${API_BASE}?sheet=Users`),
                    fetch(`${API_BASE}?sheet=Itinerary`)
                ]);

                const checkins = await checkinRes.json();
                const users = await userRes.json();
                const itinerary = await itineraryRes.json();

                // 1. 查找隊員
                const user = users.find(u => (u.ID || u.id) === id);
                if(!user) {
                    alert("查無此 ID 隊員");
                    location.reload();
                    return;
                }

                // 2. 篩選該隊員 4/27 - 5/1 且為 END 的紀錄
                const targetDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                const userRecords = checkins.filter(r => r.CustomerID === id && targetDays.includes(r.Day) && r.Type === 'END');

                // 3. 處理每日分段
                let splitsHtml = "";
                let totalKM = 0;
                let totalMin = 0;

                targetDays.forEach(day => {
                    const dayRecords = userRecords.filter(r => r.Day === day);
                    let dayKM = 0;
                    let dayMin = 0;
                    let sections = [];

                    dayRecords.forEach(r => {
                        const info = itinerary.find(i => i.Day === day && i.Section.toLowerCase() === r.Section.toLowerCase());
                        if(info) {
                            const d = parseFloat(info.D || 0);
                            dayKM += d;
                            totalKM += d;

                            const timeStr = info.Est_Time || "";
                            const hr = parseInt(timeStr.match(/(\d+)\s*hr/) ? timeStr.match(/(\d+)\s*hr/)[1] : 0);
                            const min = parseInt(timeStr.match(/(\d+)\s*min/) ? timeStr.match(/(\d+)\s*min/)[1] : 0);
                            dayMin += (hr * 60 + min);
                            totalMin += (hr * 60 + min);
                            sections.push(r.Section);
                        }
                    });

                    splitsHtml += `
                        <tr class="split-row">
                            <td class="p-6 font-black tech-font text-yellow-500">${day}</td>
                            <td class="p-6 text-slate-300 font-bold">${sections.length > 0 ? sections.join(', ') : '---'}</td>
                            <td class="p-6 font-black text-xl">${dayKM.toFixed(1)} <span class="text-[10px] text-slate-500">KM</span></td>
                            <td class="p-6 font-bold text-slate-400">${Math.floor(dayMin/60)}h ${dayMin%60}m</td>
                            <td class="p-6 text-right">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black ${dayKM > 0 ? 'bg-green-900/30 text-green-400 border border-green-800' : 'bg-slate-800 text-slate-600'}">
                                    ${dayKM > 0 ? 'COMPLETED' : 'NO DATA'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                // 4. 更新介面
                document.getElementById('dispName').innerText = user.NAME || user.Name;
                document.getElementById('dispID').innerText = `ID: ${id}`;
                document.getElementById('totalKM').innerText = totalKM.toFixed(1);
                document.getElementById('totalSS').innerText = userRecords.length;
                document.getElementById('totalTime').innerText = `${Math.floor(totalMin/60)}h ${totalMin%60}m`;
                document.getElementById('splitTableBody').innerHTML = splitsHtml;

                document.getElementById('welcomeMsg').classList.add('hidden');
                document.getElementById('resultsArea').classList.remove('hidden');

            } catch (e) {
                alert("數據提取失敗");
                console.error(e);
            }
        }
    </script>
</body>
</html>
