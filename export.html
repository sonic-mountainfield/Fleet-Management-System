<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNNY HOUSE - 真實數據指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Noto Sans TC', sans-serif; color: #f1f5f9; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .split-row:hover { background: rgba(51, 65, 85, 0.4); }
        .time-tag { font-size: 10px; color: #fbbf24; font-family: 'Orbitron'; margin-left: 4px; font-weight: 700; }
        .data-value { font-family: 'Orbitron', sans-serif; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-8">
        <div class="flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="tech-font text-2xl font-black tracking-tighter text-white uppercase italic">Fleet Telemetry Center</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">數據監控與即時匯出系統 - 真實用時版</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="searchID" placeholder="輸入 ID (如 U100)" 
                       class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg w-full md:w-48 tech-font text-yellow-500 focus:outline-none focus:border-yellow-500">
                <button onclick="fetchDriverStats()" 
                        class="bg-white text-slate-900 px-6 py-2 rounded-lg font-black hover:bg-yellow-500 transition-colors">查詢數據</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto space-y-6">
        <section id="profileCard" class="glass-panel rounded-3xl p-8 hidden">
            <div class="flex flex-col md:flex-row justify-between gap-8 text-center md:text-left items-center">
                <div class="flex-1">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">Driver Analysis</p>
                    <div class="flex flex-col md:flex-row items-center md:items-end gap-4">
                        <h2 id="dispName" class="text-5xl font-black text-white italic">---</h2>
                        <div class="mb-2">
                            <span id="dispID" class="bg-slate-800 text-slate-400 px-3 py-1 rounded text-[10px] tech-font">ID: ---</span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-8 border-l border-slate-700 pl-8">
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">總里程</p>
                        <p class="text-2xl data-value text-white"><span id="totalKM">0.0</span><span class="text-xs ml-1 opacity-50 uppercase">km</span></p>
                    </div>
                    <div class="border-x border-slate-800 px-4">
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">完賽段數</p>
                        <p id="totalStages" class="text-2xl data-value text-yellow-500">0</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">真實總用時</p>
                        <p id="totalTime" class="text-2xl data-value text-yellow-500">0h 0m</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="glass-panel rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-800/30">
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 italic">Daily Telemetry Log (Actual Time)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-[10px] uppercase font-black text-slate-500">
                        <tr>
                            <th class="p-6">日期</th>
                            <th class="p-6">航段明細 (實際用時)</th>
                            <th class="p-6">單日里程</th>
                            <th class="p-6">當日實際總時數</th>
                            <th class="p-6 text-right">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="splitsTableBody" class="text-sm">
                        <tr>
                            <td colspan="5" class="p-20 text-center text-slate-600 tech-font italic uppercase tracking-widest">
                                Awaiting Command...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/j7wain8kbsyu9';

        function formatExcelDate(rawDate) {
            if (!isNaN(rawDate) && parseFloat(rawDate) > 40000) {
                const dateObj = new Date((parseFloat(rawDate) - 25569) * 86400000);
                return `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
            }
            return String(rawDate).trim();
        }

        async function fetchDriverStats() {
            const rawID = document.getElementById('searchID').value.trim();
            if(!rawID) return alert("請輸入查詢 ID");
            const searchID = rawID.toUpperCase();

            const tableBody = document.getElementById('splitsTableBody');
            const profile = document.getElementById('profileCard');
            tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center animate-pulse text-yellow-500 tech-font">衛星連線同步中...</td></tr>';

            try {
                const [itiRes, checkRes, userRes] = await Promise.all([
                    fetch(`${API_BASE}?sheet=Itinerary`),
                    fetch(`${API_BASE}?sheet=CheckIns`),
                    fetch(`${API_BASE}?sheet=Users`)
                ]);

                const itinerary = await itiRes.json();
                const allChecks = await checkRes.json();
                const allUsers = await userRes.json();

                const user = allUsers.find(u => 
                    (u.CustomerID && u.CustomerID.trim().toUpperCase() === searchID) || 
                    (u.ID && u.ID.trim().toUpperCase() === searchID)
                );

                if(!user) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-red-500 font-black tech-font">DRIVER NOT FOUND</td></tr>';
                    profile.classList.add('hidden');
                    return;
                }

                profile.classList.remove('hidden');
                document.getElementById('dispName').innerText = user.N || user.Name || "---";
                document.getElementById('dispID').innerText = `ID: ${searchID}`;

                // 篩選該隊員的所有紀錄
                const userRecords = allChecks.filter(r => 
                    r.CustomerID && r.CustomerID.trim().toUpperCase() === searchID
                );

                const targetDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                let totalKM = 0;
                let totalActualMin = 0;
                let splitsHtml = "";

                targetDays.forEach(day => {
                    const dayRecords = userRecords.filter(r => formatExcelDate(r.Day) === day);
                    
                    // 找出當天所有出現過的 SS 名稱 (去重)
                    const sections = [...new Set(dayRecords.map(r => r.Section.trim()))];
                    
                    let dayKM = 0;
                    let dayActualMin = 0;
                    let sectionDetails = [];

                    sections.forEach(secName => {
                        const startPoint = dayRecords.find(r => r.Section.trim() === secName && r.Type.trim().toUpperCase() === 'START');
                        const endPoint = dayRecords.find(r => r.Section.trim() === secName && r.Type.trim().toUpperCase() === 'END');
                        
                        // 里程還是從 Itinerary 抓 (固定里程)
                        const info = itinerary.find(i => 
                            i.Day === day && i.Section.trim().toUpperCase() === secName.toUpperCase()
                        );
                        
                        let actualTimeText = "Incomplete";
                        if (startPoint && endPoint) {
                            // 計算真實時間差
                            const startTime = new Date(startPoint.Timestamp);
                            const endTime = new Date(endPoint.Timestamp);
                            const diffMs = endTime - startTime;
                            const diffMin = Math.floor(diffMs / 60000); // 轉分鐘
                            
                            if (diffMin >= 0) {
                                dayActualMin += diffMin;
                                totalActualMin += diffMin;
                                actualTimeText = diffMin >= 60 ? 
                                    `${Math.floor(diffMin/60)}h ${diffMin%60}m` : 
                                    `${diffMin}m`;
                            }
                            
                            if(info) dayKM += (parseFloat(info.D) || 0);
                        } else if (startPoint && !endPoint) {
                            actualTimeText = "Running...";
                        }

                        if (info) {
                            sectionDetails.push(`${secName} <span class="time-tag">(${actualTimeText})</span>`);
                        }
                    });

                    totalKM += dayKM;

                    splitsHtml += `
                        <tr class="split-row border-b border-slate-700/50">
                            <td class="p-6 font-black tech-font text-yellow-500">${day}</td>
                            <td class="p-6 text-slate-300 font-bold italic">
                                ${sectionDetails.length > 0 ? sectionDetails.join('<span class="mx-2 opacity-20">|</span>') : '<span class="text-slate-700">---</span>'}
                            </td>
                            <td class="p-6 text-xl text-white data-value">
                                ${dayKM.toFixed(1)} <span class="text-[10px] text-slate-500 uppercase">km</span>
                            </td>
                            <td class="p-6 text-yellow-500 data-value">
                                ${Math.floor(dayActualMin/60)}h ${Math.round(dayActualMin%60)}m
                            </td>
                            <td class="p-6 text-right">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black ${dayKM > 0 ? 'bg-green-900/20 text-green-400 border border-green-800/50' : 'bg-slate-800 text-slate-600'}">
                                    ${dayKM > 0 ? 'COMPLETED' : 'NO DATA'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('totalKM').innerText = totalKM.toFixed(1);
                document.getElementById('totalStages').innerText = userRecords.filter(r => r.Type.trim().toUpperCase() === 'END').length;
                document.getElementById('totalTime').innerText = `${Math.floor(totalActualMin/60)}h ${Math.round(totalActualMin%60)}m`;
                tableBody.innerHTML = splitsHtml;

            } catch (e) {
                console.error(e);
                alert("數據同步異常，請檢查 API 狀態");
            }
        }
    </script>
</body>
</html>
