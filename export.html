<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據導出中心 - 陽光小屋 (五日正式行程)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        th { background-color: #8B1A1A; color: #D4AF37; white-space: nowrap; font-size: 13px; }
        td { font-size: 13px; border: 1px solid #e5e7eb; }
        .bg-summary { background-color: #fffaf0; }
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-[98%] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-8 rounded-3xl shadow-xl border-b-4 border-[#D4AF37]">
            <div class="flex items-center gap-6">
                <div class="w-16 h-16 bg-[#8B1A1A] rounded-2xl flex items-center justify-center shadow-lg">
                    <span class="text-[#D4AF37] font-black text-xl">SH</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-gray-800 tracking-tight">西藏珠峰環線 - 官方數據中心</h1>
                    <p class="text-gray-500 font-bold mt-1 uppercase text-xs tracking-widest">Official 5-Day Expedition Data Aggregator</p>
                </div>
            </div>
            <button onclick="downloadCSV()" class="bg-[#8B1A1A] text-[#D4AF37] px-8 py-4 rounded-2xl font-black shadow-xl hover:bg-black hover:scale-105 transition-all">
                📥 下載五日數據 CSV
            </button>
        </header>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="table-container overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr>
                            <th class="p-4 border-r border-[#D4AF37]/30">駕駛 ID</th>
                            <th class="p-4 border-r border-[#D4AF37]/30">駕駛員姓名</th>
                            <th class="p-4 bg-summary text-orange-900 border-r border-[#D4AF37]/30">五日總里程 (KM)</th>
                            <th class="p-4 bg-summary text-orange-900 border-r border-[#D4AF37]/30">累計完賽段</th>
                            <th class="p-4">4/27 里程</th>
                            <th class="p-4">4/28 里程</th>
                            <th class="p-4">4/29 里程</th>
                            <th class="p-4">4/30 里程</th>
                            <th class="p-4">5/1 里程</th>
                            <th class="p-4 text-blue-800">預計總時數</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr><td colspan="10" class="p-20 text-center animate-pulse text-gray-400 font-bold italic">正在提取五日衛星紀錄並計算里程...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-6 text-center text-gray-400 text-xs font-medium uppercase tracking-tighter">
            Data synchronized from Google Sheets via SheetDB API | Period: 2026-04-27 to 2026-05-01
        </footer>
    </div>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/poo9epu17583p';
        let finalReport = [];

        async function fetchAndProcess() {
            try {
                const [checkinRes, userRes, itineraryRes] = await Promise.all([
                    fetch(`${API_BASE}?sheet=CheckIns`),
                    fetch(`${API_BASE}?sheet=Users`),
                    fetch(`${API_BASE}?sheet=Itinerary`)
                ]);

                const checkins = await checkinRes.json();
                const users = await userRes.json();
                const itinerary = await itineraryRes.json();

                const userMap = {};
                users.forEach(u => userMap[u.ID || u.id] = u.NAME || u.Name);

                // 建立行程查找字典
                const distLookup = {};
                itinerary.forEach(item => {
                    const key = `${item.Day}_${(item.Section || "").toLowerCase()}`;
                    distLookup[key] = parseFloat(item.D || 0);
                });

                // 按隊員分組
                const fleet = {};
                checkins.forEach(reg => {
                    const id = reg.CustomerID;
                    // 只統計 4/27-5/1 的紀錄
                    if (["4/27", "4/28", "4/29", "4/30", "5/1"].includes(reg.Day)) {
                        if (!fleet[id]) fleet[id] = [];
                        fleet[id].push(reg);
                    }
                });

                finalReport = Object.keys(fleet).map(id => {
                    const records = fleet[id];
                    const driverName = userMap[id] || id;
                    
                    const doneRecords = records.filter(r => r.Type === 'END');
                    
                    let dayStats = { "4/27": 0, "4/28": 0, "4/29": 0, "4/30": 0, "5/1": 0 };
                    let totalDist = 0;
                    let totalStages = doneRecords.length;

                    doneRecords.forEach(r => {
                        const lookupKey = `${r.Day}_${(r.Section || "").toLowerCase()}`;
                        const d = distLookup[lookupKey] || 0;
                        if (dayStats[r.Day] !== undefined) {
                            dayStats[r.Day] += d;
                        }
                        totalDist += d;
                    });

                    // 時間累計計算
                    let totalMin = 0;
                    const doneSections = [...new Set(doneRecords.map(r => `${r.Day}_${r.Section.toLowerCase()}`))];
                    itinerary.forEach(item => {
                        if(doneSections.includes(`${item.Day}_${item.Section.toLowerCase()}`)) {
                            const timeStr = item.Est_Time || "";
                            const hr = parseInt(timeStr.match(/(\d+)\s*hr/) ? timeStr.match(/(\d+)\s*hr/)[1] : 0);
                            const min = parseInt(timeStr.match(/(\d+)\s*min/) ? timeStr.match(/(\d+)\s*min/)[1] : 0);
                            totalMin += (hr * 60 + min);
                        }
                    });

                    return {
                        id,
                        name: driverName,
                        totalDist: totalDist.toFixed(1),
                        totalStages,
                        ...dayStats,
                        totalTime: `${Math.floor(totalMin/60)}h ${totalMin%60}m`
                    };
                });

                renderTable();
            } catch (e) {
                document.getElementById('dataTable').innerHTML = "數據讀取失敗，請檢查網路連線。";
            }
        }

        function renderTable() {
            const html = finalReport.map(d => `
                <tr class="hover:bg-gray-50 transition-all">
                    <td class="p-4 border font-mono font-bold text-gray-500">${d.id}</td>
                    <td class="p-4 border font-black text-gray-800 text-base">${d.name}</td>
                    <td class="p-4 border bg-orange-50 font-black text-orange-700 text-lg">${d.totalDist}</td>
                    <td class="p-4 border bg-orange-50 font-bold text-orange-600">${d.totalStages} 段</td>
                    <td class="p-4 border text-gray-600 font-medium">${d['4/27']} km</td>
                    <td class="p-4 border text-gray-600 font-medium">${d['4/28']} km</td>
                    <td class="p-4 border text-gray-600 font-medium">${d['4/29']} km</td>
                    <td class="p-4 border text-gray-600 font-medium">${d['4/30']} km</td>
                    <td class="p-4 border text-gray-600 font-medium">${d['5/1']} km</td>
                    <td class="p-4 border font-black text-blue-700">${d.totalTime}</td>
                </tr>
            `).join('');
            document.getElementById('dataTable').innerHTML = html;
        }

        function downloadCSV() {
            let csv = "\uFEFFID,姓名,五日總里程,總完賽段,4/27里程,4/28里程,4/29里程,4/30里程,5/1里程,預計總工時\n";
            finalReport.forEach(d => {
                csv += `${d.id},${d.name},${d.totalDist},${d.totalStages},${d['4/27']},${d['4/28']},${d['4/29']},${d['4/30']},${d['5/1']},${d.totalTime}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `陽光小屋_五日完賽數據_${new Date().toLocaleDateString()}.csv`);
            link.click();
        }

        fetchAndProcess();
    </script>
</body>
</html>
