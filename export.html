<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNNY HOUSE - 數據指揮中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #eab308; }
        .split-row:hover { background: rgba(51, 65, 85, 0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto mb-8">
        <div class="flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="tech-font text-2xl font-black tracking-tighter text-white">FLEET TELEMETRY CENTER</h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">西藏珠峰環線 - 專業數據指揮部</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <input type="text" id="searchID" placeholder="輸入隊員 ID (如 U100)" 
                       class="bg-slate-900 border border-slate-700 px-4 py-2 rounded-lg w-full md:w-48 tech-font text-yellow-500 focus:outline-none focus:border-yellow-500">
                <button onclick="fetchDriverStats()" 
                        class="bg-white text-slate-900 px-6 py-2 rounded-lg font-black hover:bg-yellow-500 transition-colors">查詢數據</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto space-y-6">
        
        <section id="profileCard" class="glass-panel rounded-3xl p-8 hidden">
            <div class="flex flex-col md:flex-row justify-between gap-8">
                <div class="flex-1">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1">DRIVER PROFILE</p>
                    <div class="flex items-end gap-4">
                        <h2 id="dispName" class="text-5xl font-black text-white italic">---</h2>
                        <div class="mb-2">
                            <span id="dispID" class="bg-slate-800 text-slate-400 px-3 py-1 rounded text-[10px] tech-font mr-2">ID: ---</span>
                            <span class="bg-green-900/30 text-green-400 border border-green-800 px-3 py-1 rounded text-[10px] font-black">OFFICIAL FINISHER</span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-8 text-center">
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">總里程 (TOTAL)</p>
                        <p class="text-3xl font-black tech-white italic"><span id="totalKM">0.0</span><span class="text-sm ml-1 text-slate-500">KM</span></p>
                    </div>
                    <div class="border-x border-slate-800 px-8">
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">完賽段 (STAGES)</p>
                        <p id="totalStages" class="text-3xl font-black tech-font text-yellow-500">0</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">總時數 (DURATION)</p>
                        <p id="totalTime" class="text-3xl font-black tech-font text-yellow-500">0h 0m</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="glass-panel rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-400">5-Day Performance Splits</h3>
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                    <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 text-[10px] uppercase font-black text-slate-500">
                        <tr>
                            <th class="p-6">日期 (DATE)</th>
                            <th class="p-6">當日航段 (SECTION & DURATION)</th>
                            <th class="p-6">單日里程 (SPLIT KM)</th>
                            <th class="p-6">單日工時 (SPLIT TIME)</th>
                            <th class="p-6 text-right">狀態 (STATUS)</th>
                        </tr>
                    </thead>
                    <tbody id="splitsTableBody" class="text-sm">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/j7wain8kbsyu9';

        async function fetchDriverStats() {
            const id = document.getElementById('searchID').value.toUpperCase();
            if(!id) return alert("請輸入隊員 ID");

            const body = document.getElementById('splitsTableBody');
            body.innerHTML = '<tr><td colspan="5" class="p-20 text-center animate-pulse text-slate-500 tech-font">ANALYZING TELEMETRY DATA...</td></tr>';

            try {
                const [itiRes, checkRes, userRes] = await Promise.all([
                    fetch(`${API_BASE}?sheet=Itinerary`),
                    fetch(`${API_BASE}?sheet=CheckIns`),
                    fetch(`${API_BASE}?sheet=Users`)
                ]);

                const itinerary = await itiRes.json();
                const allChecks = await checkRes.json();
                const allUsers = await userRes.json();

                const user = allUsers.find(u => u.CustomerID === id);
                if(!user) {
                    body.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-red-500 font-bold">DRIVER NOT FOUND</td></tr>';
                    return;
                }

                document.getElementById('profileCard').classList.remove('hidden');
                document.getElementById('dispName').innerText = user.Name;
                document.getElementById('dispID').innerText = `ID: ${user.CustomerID}`;

                const userRecords = allChecks.filter(r => r.CustomerID === id && r.Type === 'END');
                const targetDays = ["4/27", "4/28", "4/29", "4/30", "5/1"];
                
                let totalKM = 0;
                let totalMin = 0;
                let splitsHtml = "";

                targetDays.forEach(day => {
                    const dayRecords = userRecords.filter(r => r.Day === day);
                    let dayKM = 0;
                    let dayMin = 0;
                    let sectionDetails = [];

                    dayRecords.forEach(r => {
                        const info = itinerary.find(i => i.Day === day && i.Section.toLowerCase() === r.Section.toLowerCase());
                        if(info) {
                            const d = parseFloat(info.D || 0);
                            dayKM += d;
                            totalKM += d;

                            // 修正：更精確的時間解析邏輯
                            const timeStr = info.Est_Time || "";
                            const hrMatch = timeStr.match(/([\d.]+)\s*hr/i);
                            const minMatch = timeStr.match(/([\d.]+)\s*min/i);
                            
                            const hr = hrMatch ? parseFloat(hrMatch[1]) : 0;
                            const min = minMatch ? parseFloat(minMatch[1]) : 0;
                            const currentSecMin = (hr * 60 + min);
                            
                            dayMin += currentSecMin;
                            totalMin += currentSecMin;

                            // 修改：將「用時」括號顯示在航段後面
                            const displayTime = hr > 0 ? `${hr}h` : `${min}m`;
                            sectionDetails.push(`${r.Section} <span class="text-[10px] opacity-40">(${displayTime})</span>`);
                        }
                    });

                    splitsHtml += `
                        <tr class="split-row border-b border-slate-700/50 transition-colors">
                            <td class="p-6 font-black tech-font text-yellow-500">${day}</td>
                            <td class="p-6 text-slate-300 font-bold">
                                ${sectionDetails.length > 0 ? sectionDetails.join('<span class="mx-2 opacity-20">|</span>') : '<span class="text-slate-700">---</span>'}
                            </td>
                            <td class="p-6 font-black text-xl text-white">
                                ${dayKM.toFixed(1)} <span class="text-[10px] text-slate-500">KM</span>
                            </td>
                            <td class="p-6 font-bold text-yellow-500/80 tech-font">
                                ${Math.floor(dayMin/60)}h ${Math.round(dayMin%60)}m
                            </td>
                            <td class="p-6 text-right">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black ${dayKM > 0 ? 'bg-green-900/30 text-green-400 border border-green-800' : 'bg-slate-800 text-slate-600'}">
                                    ${dayKM > 0 ? 'COMPLETED' : 'NO DATA'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('totalKM').innerText = totalKM.toFixed(1);
                document.getElementById('totalStages').innerText = userRecords.length;
                document.getElementById('totalTime').innerText = `${Math.floor(totalMin/60)}h ${Math.round(totalMin%60)}m`;
                body.innerHTML = splitsHtml;

            } catch (e) {
                console.error(e);
                alert("數據提取失敗，請檢查網路連線");
            }
        }
    </script>
</body>
</html>
